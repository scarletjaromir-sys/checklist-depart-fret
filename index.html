<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Départ Train">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1e">
<title>Checklist Départ Train — FRET</title>
<style>
:root {
  --green: #1a7a3c;   /* vert FRET — plus foncé, institutionnel */
  --green-light: #2da84f;
  --amber: #ff9f0a;
  --red:   #ff453a;
  --teal:  #5ac8fa;
  --mono: ui-monospace, 'SF Mono', Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
}

/* ══════════════════════════════════════════
FOND — gris sombre avec motif géométrique
Le motif est indispensable pour que le
backdrop-filter blur ait quelque chose
à flouter derrière les blocs verre
══════════════════════════════════════════ */
html {
background-color: #1c1c1e !important;
min-height: 100%;
}
body {
font-family: var(–sans);
color: #fff;
min-height: 100dvh;
padding: 0 0 calc(84px + env(safe-area-inset-bottom));
background-color: #1c1c1e !important;
/* Motif SVG très léger — lignes croisées qui donnent de la texture */
background-image: url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ stroke=’%23ffffff’ stroke-width=‘0.4’ stroke-opacity=‘0.06’%3E%3Cpath d=‘M0 60L60 0M-10 10L10 -10M50 70L70 50’/%3E%3C/g%3E%3C/svg%3E”) !important;
background-size: 60px 60px !important;
}

/* ══ HEADER ══ */
header {
background: rgba(28,28,30,0.92);
border-bottom: 1px solid rgba(255,255,255,0.12);
padding: 13px 18px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100;
}
.logo-badge {
background: linear-gradient(135deg, #2da84f, #1a7a3c);
color: #fff;
font-family: var(–mono); font-weight: 900; font-size: 10px;
letter-spacing: 2px; padding: 4px 10px; border-radius: 6px;
border: 1px solid rgba(255,255,255,0.25);
box-shadow:
inset 0 1px 0 rgba(255,255,255,0.35),
inset 0 -1px 0 rgba(0,0,0,0.2),
0 2px 8px rgba(0,0,0,0.4);
}
header h1 {
font-weight: 700; font-size: 15px; letter-spacing: 1px;
text-transform: uppercase; color: #fff; margin-left: 10px;
}
.clock { font-family: var(–mono); font-size: 16px; color: #2da84f; letter-spacing: 1px; }

/* ══ GLASS CARD — mixin commun ══
C’est le vrai effet verre :

- fond quasi transparent
- blur qui floute le motif derrière
- bordure blanche fine
- reflet blanc sur le bord supérieur (inset)
- ombre portée pour la profondeur
  ══════════════════════════════════ */
  .glass-card {
  background: rgba(255,255,255,0.07);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
  inset 0 1.5px 0 rgba(255,255,255,0.28),   /* reflet blanc supérieur */
  inset 0 -1px 0 rgba(255,255,255,0.06),    /* reflet inférieur discret */
  0 8px 32px rgba(0,0,0,0.45),              /* ombre portée */
  0 2px 8px rgba(0,0,0,0.3);
  }

/* ══ CHRONO — quasi transparent comme iOS ══ */
.chrono-bar {
margin: 12px 16px 0;
border-radius: 16px;
padding: 10px 14px;
display: flex; align-items: center; gap: 10px;
background: rgba(255,255,255,0.02);
background-image: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 30%, rgba(255,255,255,0.0) 60%);
-webkit-backdrop-filter: blur(30px) saturate(200%);
backdrop-filter: blur(30px) saturate(200%);
border: 1px solid rgba(255,255,255,0.22);
box-shadow:
inset 0 0 12px rgba(255,255,255,0.15),
inset 0 1px 0 rgba(255,255,255,0.18),
0 6px 24px rgba(0,0,0,0.35);
}
.chrono-label { font-family: var(–mono); font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
.chrono-display { font-family: var(–mono); font-size: 21px; letter-spacing: 2px; min-width: 62px; text-align: center; font-weight: 600; }
.chrono-display.idle { color: rgba(255,255,255,0.45); }
.chrono-display.run  { color: var(–amber); }
.chrono-display.done { color: var(–green); }
.chrono-prog { flex: 1; }
.chrono-bg { background: rgba(255,255,255,0.12); border-radius: 3px; height: 3px; overflow: hidden; }
.chrono-fill { height: 100%; border-radius: 3px; transition: width .5s linear, background .3s; }
.chrono-btns { display: flex; gap: 6px; flex-shrink: 0; }

/* Boutons START/SET/RST — quasi transparents */
.cbtn {
font-family: var(–mono); font-size: 11px; font-weight: 700;
padding: 7px 12px; border-radius: 10px; cursor: pointer;
-webkit-tap-highlight-color: transparent;
-webkit-backdrop-filter: blur(30px) saturate(200%);
backdrop-filter: blur(30px) saturate(200%);
border: 1px solid rgba(255,255,255,0.28);
box-shadow:
inset 0 0 10px rgba(255,255,255,0.15),
inset 0 1px 0 rgba(255,255,255,0.2),
0 3px 10px rgba(0,0,0,0.35);
background: linear-gradient(135deg,
rgba(255,255,255,0.10) 0%,
rgba(255,255,255,0.02) 40%,
rgba(255,255,255,0.0) 100%);
color: #fff;
}
.cbtn-start { color: #ffdd88; border-color: rgba(255,200,80,0.45); }
.cbtn-start.running { color: #ffaaaa; border-color: rgba(255,100,80,0.45); }
.cbtn-set { color: #88bbff; border-color: rgba(80,140,255,0.45); }
.cbtn-rst { color: rgba(255,255,255,0.85); }

/* ══ PROGRESS ══ */
.progress-wrap { padding: 12px 16px 6px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.progress-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.progress-count { font-family: var(–mono); font-size: 13px; color: var(–green); font-weight: 600; }
.progress-bar-bg { background: rgba(255,255,255,0.12); border-radius: 3px; height: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #1a7a3c, #2da84f); border-radius: 3px; transition: width .4s ease; }

/* ══ MINUTE BANNER ══ */
.minute-banner {
margin: 10px 16px 0; border-radius: 14px; padding: 10px 14px;
display: flex; gap: 9px; align-items: flex-start;
background: rgba(255,159,10,0.1);
-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
border: 1px solid rgba(255,159,10,0.35); border-left: 3px solid var(–amber);
box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.2), 0 4px 16px rgba(0,0,0,0.3);
}
.minute-icon { font-size: 15px; flex-shrink: 0; margin-top: 2px; }
.minute-text strong { font-weight: 700; font-size: 12px; color: #ffcc66; display: block; margin-bottom: 2px; }
.minute-text span { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.4; }

/* ══ SECTIONS ══
Chaque bloc = verre quasi-transparent
avec un dégradé de couleur bleue en haut
qui fond vers transparent vers le bas.
La couleur devient de plus en plus claire
de la 1ère à la dernière section.
══════════════════════════════════════════ */

.section-header {
display: flex; align-items: center; justify-content: space-between;
padding: 13px 16px; cursor: pointer; user-select: none;
border-radius: 16px;
background: rgba(255,255,255,0.03);
-webkit-backdrop-filter: blur(30px) saturate(200%);
backdrop-filter: blur(30px) saturate(200%);
border: 1px solid rgba(255,255,255,0.22);
box-shadow:
inset 0 0 12px rgba(255,255,255,0.15),
inset 0 1px 0 rgba(255,255,255,0.18),
0 8px 24px rgba(0,0,0,0.4);
transition: box-shadow .25s ease;
position: relative;
}
.section:not(.collapsed) .section-header {
border-radius: 16px 16px 0 0;
border-bottom-color: rgba(255,255,255,0.08);
}
.section-header:active { filter: brightness(1.2); }

/* Dégradé couleur — pseudo-élément pour superposer sur le verre.
Bleu foncé en haut → transparent en bas.
9 sections, la teinte bleue s’éclaircit progressivement */
.section-header::before {
content: ‘’;
position: absolute; inset: 0;
border-radius: inherit;
pointer-events: none;
/* Dégradé vertical fort en haut, fade vers bas */
}
/* Dégradé bleu très léger + bande lumineuse — opacités basses comme iOS */
.sec-ps    .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(20,60,180,0.18) 0%, rgba(20,60,180,0.0) 70%); }
.sec-prep  .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(25,75,190,0.16) 0%, rgba(25,75,190,0.0) 70%); }
.sec-brief .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(30,95,200,0.14) 0%, rgba(30,95,200,0.0) 70%); }
.sec-bf    .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(35,115,205,0.13) 0%, rgba(35,115,205,0.0) 70%); }
.sec-ppe-b .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(40,135,210,0.12) 0%, rgba(40,135,210,0.0) 70%); }
.sec-ppe-s .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(45,155,215,0.12) 0%, rgba(45,155,215,0.0) 70%); }
.sec-par   .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(50,175,220,0.11) 0%, rgba(50,175,220,0.0) 70%); }
.sec-aum   .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(55,190,225,0.10) 0%, rgba(55,190,225,0.0) 70%); }
.sec-hd    .section-header::before { background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.0) 35%), linear-gradient(170deg, rgba(60,205,235,0.09) 0%, rgba(60,205,235,0.0) 70%); }

/* Corps de section — verre sombre avec reflets */
.section-body {
background: rgba(255,255,255,0.02);
-webkit-backdrop-filter: blur(30px) saturate(180%);
backdrop-filter: blur(30px) saturate(180%);
border: 1px solid rgba(255,255,255,0.16);
border-top: none; border-radius: 0 0 16px 16px;
box-shadow:
inset 1px 0 0 rgba(255,255,255,0.1),
inset -1px 0 0 rgba(255,255,255,0.05),
inset 0 -2px 0 rgba(255,255,255,0.1),
0 10px 28px rgba(0,0,0,0.3);
}
.section.collapsed .section-body { display: none; }

/* Badge — plus grand, seul texte du header */
.section-title-wrap { display: flex; align-items: center; gap: 9px; position: relative; z-index: 1; }
.section-badge {
font-family: var(–mono); font-size: 12px; font-weight: 800;
padding: 5px 10px; border-radius: 8px; letter-spacing: 1px; white-space: nowrap;
background: rgba(0,0,0,0.35);
border: 1px solid rgba(255,255,255,0.32);
color: #fff;
box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 6px rgba(0,0,0,0.4);
}
/* Titre masqué — on n’affiche que le badge */
.section-title { display: none; }
.section-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; position: relative; z-index: 1; }
.section-progress { font-family: var(–mono); font-size: 12px; color: rgba(255,255,255,0.75); font-weight: 700; }
.chevron { color: rgba(255,255,255,0.7); font-size: 10px; transition: transform .2s; }
.section.collapsed .chevron { transform: rotate(-90deg); }

/* ══ OMBRES BLANCHES DANS LES ANGLES — bandes lumineuses visibles ══ */
.section-header::after {
content: ‘’;
position: absolute; inset: 0;
border-radius: inherit;
pointer-events: none;
background:
/* Bande lumineuse principale — diagonale coin supérieur gauche */
linear-gradient(135deg,
rgba(255,255,255,0.30) 0%,
rgba(255,255,255,0.12) 18%,
rgba(255,255,255,0.0)  40%,
rgba(255,255,255,0.0)  100%),
/* Reflet droit léger */
linear-gradient(270deg,
rgba(255,255,255,0.08) 0%,
transparent 40%),
/* Lueur bord inférieur */
linear-gradient(0deg,
rgba(255,255,255,0.06) 0%,
transparent 30%);
z-index: 0;
}

/* ══ HOVER — légère bascule 3D ══ */
.section {
margin: 10px 16px 0; border-radius: 16px; overflow: hidden;
transition: transform .25s ease, box-shadow .25s ease;
}
.section:hover {
transform: translateY(-3px) scale(1.005);
box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.12);
}
.section:hover .section-header {
box-shadow:
inset 0 3px 0 rgba(255,255,255,0.65),
inset 0 -1px 0 rgba(255,255,255,0.1),
inset 1px 0 0 rgba(255,255,255,0.25),
inset -1px 0 0 rgba(255,255,255,0.1),
0 10px 36px rgba(0,0,0,0.55);
}
.master-item {
display: flex; align-items: flex-start; gap: 12px;
padding: 13px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
border-bottom: 1px solid rgba(255,255,255,0.08);
}
.master-item:active { background: rgba(255,255,255,0.05); }
.master-item.checked { opacity: .42; }
.master-item.checked .master-label { text-decoration: line-through; }
.master-item .checkbox {
width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
border: 1.5px solid rgba(255,200,80,0.7);
background: rgba(255,200,80,0.1);
display: flex; align-items: center; justify-content: center;
transition: all .15s; margin-top: 1px;
}
.master-item .checkmark, .checkmark { display: none; color: #000; font-size: 15px; font-weight: 900; }
.master-item.checked .checkmark { display: block; }
.master-label { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.3; color: #fff; }
.master-hint { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; line-height: 1.4; }

/* ══ SUBMENU ══ */
.submenu-toggle {
padding: 8px 16px; display: flex; align-items: center; gap: 6px;
cursor: pointer; font-family: var(–mono); font-size: 10px;
color: var(–teal); font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
border-bottom: 1px solid rgba(255,255,255,0.08); -webkit-tap-highlight-color: transparent;
}
.submenu-toggle:active { background: rgba(255,255,255,0.04); }
.submenu-arrow { transition: transform .2s; font-size: 9px; }
.submenu-open .submenu-arrow { transform: rotate(90deg); }
.submenu { display: none; background: rgba(0,0,0,0.12); }

/* ══ SUB-GROUP ══ */
.sub-group-label {
padding: 7px 16px 4px; font-family: var(–mono); font-size: 9px;
letter-spacing: 1.5px; text-transform: uppercase;
color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.03);
border-bottom: 1px solid rgba(255,255,255,0.07);
}

/* ══ ITEMS ══ */
.check-item {
display: flex; align-items: flex-start; gap: 12px;
padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.check-item:last-child { border-bottom: none; }
.check-item:active { background: rgba(255,255,255,0.04); }
.check-item.checked { opacity: .35; }
.check-item.checked .item-label { text-decoration: line-through; }
.checkbox {
width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
border: 1.5px solid rgba(255,255,255,0.38);
background: rgba(255,255,255,0.07);
display: flex; align-items: center; justify-content: center;
transition: all .15s; margin-top: 1px;
}
.check-item.checked .checkbox { background: #2da84f; border-color: #1a7a3c; }
.master-item.checked .checkbox { background: #2da84f; border-color: #1a7a3c; }
.check-item.checked .checkmark { display: block; }
.item-content { flex: 1; }
.item-label { font-size: 14px; font-weight: 500; line-height: 1.3; color: #fff; }
.item-detail { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 3px; line-height: 1.45; }
.item-tag {
display: inline-block; font-family: var(–mono); font-size: 8px;
letter-spacing: 0.5px; padding: 2px 7px; border-radius: 5px;
margin-top: 5px; text-transform: uppercase; font-weight: 700;
}
.tag-oblig { background: rgba(255,69,58,0.18); color: #ffaaaa; border: 1px solid rgba(255,69,58,0.4); }
.tag-cond  { background: rgba(255,159,10,0.15); color: #ffcc66; border: 1px solid rgba(255,159,10,0.4); }
.formula {
display: inline-block; font-family: var(–mono); font-size: 14px; font-weight: 700;
background: rgba(26,122,60,0.25); color: #88ffaa;
border: 1px solid rgba(45,168,79,0.5);
padding: 3px 12px; border-radius: 8px; margin-top: 5px;
}

/* ══ NOTE ══ */
.section-note {
padding: 9px 16px; background: rgba(255,159,10,0.06);
border-top: 1px solid rgba(255,255,255,0.06);
font-size: 11px; color: rgba(255,255,255,0.65); line-height: 1.5;
}
.section-note .warn { color: #ffcc66; font-weight: 600; }

/* ══ BOTTOM BAR ══ */
.bottom-bar {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(20,20,22,0.88);
-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.12);
padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
display: flex; gap: 10px; z-index: 100;
}
.btn {
flex: 1; padding: 14px; border-radius: 14px;
font-family: var(–sans); font-weight: 700; font-size: 13px;
letter-spacing: 0.3px; text-transform: uppercase;
cursor: pointer; -webkit-tap-highlight-color: transparent;
background: rgba(255,255,255,0.08);
-webkit-backdrop-filter: blur(24px) saturate(200%);
backdrop-filter: blur(24px) saturate(200%);
border: 1px solid rgba(255,255,255,0.28);
box-shadow:
inset 0 2px 0 rgba(255,255,255,0.45),
inset 0 -1px 0 rgba(0,0,0,0.2),
inset 1px 0 0 rgba(255,255,255,0.15),
0 6px 20px rgba(0,0,0,0.45);
color: #fff;
}
.btn-reset { color: rgba(255,255,255,0.8); }
.btn-ok    { background: rgba(29,122,60,0.4); color: #88ffaa; border-color: rgba(45,168,79,0.5); flex: 2; }
.btn-warn  { background: rgba(255,159,10,0.25); color: #ffcc66; border-color: rgba(255,159,10,0.5); flex: 2; }
.btn-block { background: rgba(255,69,58,0.25); color: #ffaaaa; border-color: rgba(255,69,58,0.5); flex: 2; }

/* ══ MODAL ══ */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.55);
-webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
background: rgba(24,24,26,0.96);
-webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
border: 1px solid rgba(255,255,255,0.18); border-bottom: none;
border-radius: 22px 22px 0 0;
padding: 20px 18px calc(28px + env(safe-area-inset-bottom));
width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.22), 0 -12px 60px rgba(0,0,0,0.6);
animation: slideUp .25s ease;
}
.modal.m-warn  { border-color: rgba(255,159,10,0.4); }
.modal.m-block { border-color: rgba(255,69,58,0.45); }
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.22); border-radius: 2px; margin: 0 auto 18px; }
.modal h2 { font-size: 19px; font-weight: 800; text-align: center; margin-bottom: 4px; color: #fff; }
.modal h2.ok    { color: #2da84f; }
.modal h2.warn  { color: #ffcc66; }
.modal h2.block { color: #ffaaaa; }
.modal-sub { font-family: var(–mono); font-size: 11px; color: rgba(255,255,255,0.55); text-align: center; margin-bottom: 16px; }

.blockers { margin-bottom: 12px; }
.blocker-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 13px; background: rgba(255,69,58,0.12); border: 1px solid rgba(255,69,58,0.32); border-radius: 12px; margin-bottom: 6px; }
.blocker-icon { font-size: 14px; flex-shrink: 0; }
.blocker-text { font-size: 13px; font-weight: 600; color: #ffaaaa; line-height: 1.3; }

.modal-recap { margin-bottom: 14px; }
.recap-row { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-radius: 12px; margin-bottom: 5px; }
.r-done  { background: rgba(26,122,60,0.15); border: 1px solid rgba(45,168,79,0.3); }
.r-warn  { background: rgba(255,159,10,0.1); border: 1px solid rgba(255,159,10,0.25); }
.r-block { background: rgba(255,69,58,0.1);  border: 1px solid rgba(255,69,58,0.3); }
.recap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.r-done  .recap-dot { background: #2da84f; }
.r-warn  .recap-dot { background: #ffcc66; }
.r-block .recap-dot { background: #ffaaaa; }
.recap-name  { font-size: 13px; font-weight: 700; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; }
.recap-score { font-family: var(–mono); font-size: 11px; color: rgba(255,255,255,0.5); }
.r-done  .recap-score { color: #2da84f; }
.r-block .recap-score { color: #ffaaaa; }

.modal-close {
display: block; width: 100%; padding: 14px;
background: rgba(255,255,255,0.08); color: #fff;
border: 1px solid rgba(255,255,255,0.18); border-radius: 14px;
font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 8px;
box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.2);
}
.modal-close.danger { background: rgba(255,69,58,0.15); color: #ffaaaa; border-color: rgba(255,69,58,0.35); }

/* ══ CHRONO SET ══ */
.cset-modal {
background: rgba(24,24,26,0.96);
-webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
border: 1px solid rgba(255,255,255,0.18); border-bottom: none;
border-radius: 22px 22px 0 0;
padding: 20px 18px calc(28px + env(safe-area-inset-bottom));
width: 100%; max-width: 360px;
animation: slideUp .25s ease;
box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.22);
}
.cset-modal h3 { font-size: 17px; font-weight: 800; color: var(–teal); margin-bottom: 20px; text-align: center; }
.dur-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; justify-content: center; }
.dur-lbl { font-family: var(–mono); font-size: 12px; color: rgba(255,255,255,0.65); }
.dur-inp {
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
color: #ffcc66; font-family: var(–mono); font-size: 28px;
padding: 10px 14px; border-radius: 12px; width: 84px; text-align: center; outline: none;
}
.dur-inp:focus { border-color: #ffcc66; }
.dur-unit { font-family: var(–mono); font-size: 14px; color: rgba(255,255,255,0.6); }
.dur-apply {
width: 100%; padding: 15px;
background: rgba(90,200,250,0.22); color: #fff;
border: 1px solid rgba(90,200,250,0.4); border-radius: 14px;
font-size: 16px; font-weight: 800; cursor: pointer;
box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.25);
}
</style>

</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <div class="logo-badge">FRET</div>
    <h1>Départ Train</h1>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="chrono-bar">
  <span class="chrono-label">⏱ Freins</span>
  <div class="chrono-display idle" id="cDisp">04:00</div>
  <div class="chrono-prog"><div class="chrono-bg"><div class="chrono-fill" id="cFill" style="width:0%"></div></div></div>
  <div class="chrono-btns">
    <button class="cbtn cbtn-start" id="cBtn" onclick="cToggle()">START</button>
    <button class="cbtn cbtn-set" onclick="openSet()">SET</button>
    <button class="cbtn cbtn-rst" onclick="cReset()">RST</button>
  </div>
</div>

<div class="minute-banner">
  <div class="minute-icon">⏱</div>
  <div class="minute-text">
    <strong>Minute d'arrêt — Gestion des conditions de mise en mouvement</strong>
    <span>Analyser · Identifier les menaces · Projet d'actions · Type de marche</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-header">
    <span class="progress-label">Progression</span>
    <span class="progress-count" id="pCount">0 / 0</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="pFill" style="width:0%"></div></div>
</div>

<div id="CL"></div>
<div style="height:4px"></div>

<div class="bottom-bar">
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <button class="btn" id="btnR" onclick="showRecap()">▶ Récap</button>
</div>

<div class="modal-overlay" id="ov" onclick="closeOv(event)">
  <div class="modal" id="mc"><div class="modal-handle"></div></div>
</div>
<div class="modal-overlay" id="cov" onclick="closeCov(event)">
  <div class="cset-modal">
    <h3>⏱ Durée minuteur</h3>
    <div class="dur-row">
      <span class="dur-lbl">Durée :</span>
      <input class="dur-inp" id="dInp" type="number" min="1" max="60" value="4" inputmode="numeric">
      <span class="dur-unit">min</span>
    </div>
    <button class="dur-apply" onclick="applyDur()">Appliquer</button>
  </div>
</div>

<script>
// CHRONO
let cT=4*60,cE=0,cR=false,cIv=null;
function cTick(){cE++;drawC();if(cE===cT){try{const ctx=new AudioContext();[880,880,1100].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;const t=ctx.currentTime+i*.28;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.4,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}let n=0;const b=document.querySelector('.chrono-bar');const iv=setInterval(()=>{b.style.background=n%2===0?'rgba(48,209,88,0.2)':'rgba(255,255,255,0.05)';if(++n>5){clearInterval(iv);b.style.background='';}},250);}}
function drawC(){const d=document.getElementById('cDisp'),f=document.getElementById('cFill'),b=document.getElementById('cBtn');if(!cR&&cE===0){d.textContent=`${String(Math.floor(cT/60)).padStart(2,'0')}:${String(cT%60).padStart(2,'0')}`;d.className='chrono-display idle';f.style.width='0%';b.textContent='START';b.className='cbtn cbtn-start';return;}d.textContent=`${String(Math.floor(cE/60)).padStart(2,'0')}:${String(cE%60).padStart(2,'0')}`;f.style.width=Math.min(cE/cT*100,100)+'%';if(cE<cT){d.className='chrono-display run';f.style.background='#ff9f0a';}else{d.className='chrono-display done';f.style.background='#2da84f';}b.textContent=cR?'STOP':'REPRISE';b.className=cR?'cbtn cbtn-start running':'cbtn cbtn-start';}
function cToggle(){if(cR){clearInterval(cIv);cR=false;}else{cR=true;cIv=setInterval(cTick,1000);}drawC();}
function cReset(){clearInterval(cIv);cR=false;cE=0;drawC();}
function openSet(){document.getElementById('dInp').value=Math.round(cT/60);document.getElementById('cov').classList.add('active');}
function applyDur(){cT=Math.max(1,Math.min(60,parseInt(document.getElementById('dInp').value)||4))*60;cReset();document.getElementById('cov').classList.remove('active');}
function closeCov(e){if(!e||e.target===document.getElementById('cov'))document.getElementById('cov').classList.remove('active');}

// DONNÉES
const DATA=[
  {id:'ps',sc:'sec-ps',b:'PRISE DE SERVICE',t:'Prise de service',mid:'psm',ml:'Prise de service déjà effectuée',mh:'Cocher si déjà réalisée — sinon dérouler le détail',note:'Êtes-vous en accord avec votre PS ?',
   groups:[{label:'Équipement & documents',items:[{id:'ps1',label:'SIRIUS et pochette chargés',detail:'Mémento, licence et Attestation Complémentaire vérifiés',tag:'o'},{id:'ps2',label:'Arrivée à l\'heure à la PS',tag:'o'}]},{label:'Consultation & préparation',items:[{id:'ps3',label:'Roulement consulté',tag:'o'},{id:'ps4',label:'Casier personnel consulté',detail:'Doc ADC, PACIFIC / ES LOCO',tag:'o'},{id:'ps5',label:'Affichage sécurité consulté',tag:'o'},{id:'ps6',label:'Avis sécurité (DEFIT) analysés',tag:'o'},{id:'ps7',label:'Modifications infrastructure repérées',detail:'LTV et autres modifications prévues mémorisées',tag:'o'},{id:'ps8',label:'Documents prélevés',detail:'Formulaires de communication, annexes Sirius…',tag:'o'},{id:'ps9',label:'Rubans de lecture posés — LILI associés à la FT',tag:'o'}]}]},
  {id:'prep',sc:'sec-prep',b:'PRÉP. MISSION',t:'Préparation de la mission',mid:'prm',ml:'Préparation de la mission déjà effectuée',mh:'Cocher si déjà réalisée — sinon dérouler le détail',note:'Vérifications sur Sirius Next avant la prise en charge du train.',
   groups:[{label:'Fiche Train',items:[{id:'ft1',label:'Date de la fiche train correcte',tag:'o'},{id:'ft2',label:'Numéro de train conforme',tag:'o'},{id:'ft3',label:'Masse tracée ≥ masse réelle du train',detail:'La masse tracée doit être supérieure ou égale à la masse totale réelle',tag:'o'},{id:'ft4',label:'EM tracé = EM en possession',detail:'Si différent : obtenir l\'autorisation de circulation',tag:'o'},{id:'ft5',label:'Avis consultés (LTV, modifications définitives)',tag:'o'}]}]},
  {id:'brief',sc:'sec-brief',b:'BRIEF',t:'Brief',note:'En fonction du type d\'arrêt et des opérations prévues.',
   groups:[{label:'',items:[{id:'br1',label:'Brief conducteur / agent au sol réalisé',detail:'N° de voie · conditions PAR et AuM · opérations de sécurité · résultat essai de frein',tag:'c'}]}]},
  {id:'bf',sc:'sec-bf',b:'BF',t:'Bulletin de Freinage',note:null,
   groups:[{label:'Identification',items:[{id:'bf1',label:'Date correcte',tag:'o'},{id:'bf2',label:'Numéro de train conforme',tag:'o'},{id:'bf3',label:'Destination correcte',tag:'o'}]},{label:'Caractéristiques',items:[{id:'bf4',label:'Tonnage total des véhicules vérifié',tag:'o'},{id:'bf5',label:'MFR ≥ MFN',detail:'Masse Freinée Réalisée ≥ Masse Freinée Nécessaire',formula:'MFR ≥ MFN',tag:'o'},{id:'bf6',label:'ATE : présence confirmée (oui / non)',tag:'o'},{id:'bf7',label:'Restrictions de vitesse signalées',detail:'Wagons limitants, charges spéciales…',tag:'o'}]},{label:'Composition',items:[{id:'bf8',label:'Positionnement du 1er wagon identifié',detail:'Ordre de liste cohérent avec la composition réelle',tag:'o'},{id:'bf9',label:'Liste MD présente si applicable',detail:'Si matières dangereuses : liste MD jointe et vérifiée',tag:'c'}]}]},
  {id:'ppe_b',sc:'sec-ppe-b',b:'PPE BORD',t:'PPE Bord',note:null,
   groups:[{label:'Composition',items:[{id:'pb1',label:'N° wagon tête confirmé',detail:'Cohérent avec BF et liste MD',tag:'o'},{id:'pb2',label:'Attelage machine / 1er wagon vérifié',tag:'o'},{id:'pb3',label:'Dispositif vide / chargé vérifié',tag:'o'},{id:'pb4',label:'Dispositif de freinage : M ou V',detail:'Régime conforme au type de matériel remorqué',tag:'o'}]},{label:'Systèmes embarqués',items:[{id:'pb5',label:'Signalisation d\'avant mise en service',tag:'o'},{id:'pb6',label:'Dispositifs de sécurité vérifiés',detail:'RSO, veille, VACMA — selon engin',tag:'o'},{id:'pb7',label:'Paramétrage bord réalisé (KVB, ETCS…)',detail:'N° train, longueur, masse freinée, catégorie vitesse',tag:'o'},{id:'pb8',label:'N° de train indexé dans le terminal GSM-R',tag:'o'},{id:'pb9',label:'Mobile pro GSM-GFU ARES activé si ligne équipée',tag:'c'}]}]},
  {id:'ppe_s',sc:'sec-ppe-s',b:'PPE SOL',t:'PPE Sol',note:null,
   groups:[{label:'',items:[{id:'pe1',label:'Résultat essai de frein reçu',detail:'Conformité transmise par l\'opérateur sol',tag:'o',bl:'⛔ Résultat essai de frein non reçu — départ interdit'},{id:'pe2',label:'PPE Sol terminé reçu',detail:'« PPE Sol terminé » — verbal ou écrit',tag:'o',bl:'⛔ PPE Sol non terminé — départ interdit'}]}]},
  {id:'par',sc:'sec-par',b:'PAR',t:'Déclaration Prêt à Accéder au Réseau',note:'En fonction du type d\'arrêt.',
   groups:[{label:'',items:[{id:'r1',label:'PAR nécessaire dans cette situation ?',detail:'1er accès RFN · modif composition · relève',tag:'c'},{id:'r2',label:'PAR transmis au SGC',detail:'« Train N°…, Voie N°…, Prêt à accéder au réseau »',tag:'o',bl:'⛔ PAR non transmis au SGC — départ interdit'},{id:'r3',label:'Wagons MD signalés si applicable',tag:'c'}]}]},
  {id:'aum',sc:'sec-aum',b:'AuM',t:'Autorisation de Mouvement',note:null,
   groups:[{label:'',items:[{id:'a1',label:'AuM reçue',detail:'Signalisation · verbal SGC · dépêche · signal à main AuM',tag:'o',bl:'⛔ AuM non reçue — départ interdit'},{id:'a2',label:'Type de marche décidé',detail:'Marche avec restriction —ou— Marche normale',tag:'o'}]}]},
  {id:'hd',sc:'sec-hd',b:'HD',t:'Heure de Départ',note:null,
   groups:[{label:'',items:[{id:'h1',label:'HD contrôlée',detail:'Ne pas partir avant l\'HD sans ordre explicite',tag:'o',bl:'⛔ HD non contrôlée — vérifier l\'heure de départ'}]}]},
];

function subs(s){return s.groups.flatMap(g=>g.items);}
function sScore(s){if(s.mid){return{d:(state[s.mid]||subs(s).every(i=>state[i.id]))?1:0,t:1};}const it=subs(s);return{d:it.filter(i=>state[i.id]).length,t:it.length};}
function gScore(){let d=0,t=0;DATA.forEach(s=>{const sc=sScore(s);d+=sc.d;t+=sc.t;});return{d,t};}
function bls(){return DATA.flatMap(s=>subs(s)).filter(i=>i.bl&&!state[i.id]);}

let state={};
function load(){try{const s=localStorage.getItem('fret-v11');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('fret-v11',JSON.stringify(state));}catch(e){}}

function render(){
  const c=document.getElementById('CL');c.innerHTML='';
  DATA.forEach(sec=>{
    const sc=sScore(sec),ok=sc.d===sc.t;
    const div=document.createElement('div');
    div.className=`section ${sec.sc}${state['_o_'+sec.id]?'':' collapsed'}`;div.id='s-'+sec.id;
    let pt=sec.mid?(state[sec.mid]||ok?'✓':`${subs(sec).filter(i=>state[i.id]).length}/${subs(sec).length}`):`${sc.d}/${sc.t}`;
    let body='';
    if(sec.mid){
      const mc=state[sec.mid]?'checked':'',so=state['_sb_'+sec.id];
      body=`<div class="master-item ${mc}" id="mi-${sec.id}" onclick="tM('${sec.id}')"><div class="checkbox"><span class="checkmark">✓</span></div><div style="flex:1"><div class="master-label">${sec.ml}</div><div class="master-hint">${sec.mh}</div></div></div><div class="submenu-toggle ${so?'submenu-open':''}" id="st-${sec.id}" onclick="tS('${sec.id}')"><span class="submenu-arrow">▶</span> Détail des vérifications</div><div class="submenu" id="sm-${sec.id}" style="${so?'':'display:none'}">${rG(sec)}</div>`;
    }else{body=rG(sec);}
    const note=sec.note?`<div class="section-note"><span class="warn">⚠</span> ${sec.note}</div>`:'';
    div.innerHTML=`<div class="section-header" onclick="tSec('${sec.id}')"><div class="section-title-wrap"><span class="section-badge">${sec.b}</span></div><div class="section-meta"><span class="section-progress" id="sp-${sec.id}">${pt}</span><span class="chevron">▼</span></div></div><div class="section-body">${body}${note}</div>`;
    c.appendChild(div);
  });upProg();
}

function rG(sec){return sec.groups.map(g=>{const lbl=g.label?`<div class="sub-group-label">${g.label}</div>`:'';return lbl+g.items.map(it=>{const ck=state[it.id]?'checked':'';const tag=it.tag?`<span class="item-tag tag-${it.tag==='o'?'oblig':'cond'}">${it.tag==='o'?'⚠ Obligatoire':'◈ Conditionnel'}</span>`:'';const fml=it.formula?`<div class="formula">${it.formula}</div>`:'';return `<div class="check-item ${ck}" id="it-${it.id}" onclick="tI('${it.id}')"><div class="checkbox"><span class="checkmark">✓</span></div><div class="item-content"><div class="item-label">${it.label}</div>${it.detail?`<div class="item-detail">${it.detail}</div>`:''}${fml}${tag}</div></div>`;}).join('');}).join('');}

function tI(id){state[id]=!state[id];save();const el=document.getElementById('it-'+id);state[id]?el.classList.add('checked'):el.classList.remove('checked');rC();upProg();}
function tM(sid){const sec=DATA.find(s=>s.id===sid);state[sec.mid]=!state[sec.mid];save();const el=document.getElementById('mi-'+sid);state[sec.mid]?el.classList.add('checked'):el.classList.remove('checked');rC();upProg();}
function tS(sid){const k='_sb_'+sid;state[k]=!state[k];save();const m=document.getElementById('sm-'+sid),t=document.getElementById('st-'+sid);if(state[k]){m.style.display='block';t.classList.add('submenu-open');}else{m.style.display='none';t.classList.remove('submenu-open');}}
function tSec(id){const k='_o_'+id;state[k]=!state[k];save();document.getElementById('s-'+id).classList.toggle('collapsed');}
function rC(){DATA.forEach(sec=>{const sc=sScore(sec),ok=sc.d===sc.t;const el=document.getElementById('sp-'+sec.id);if(!el)return;el.textContent=sec.mid?(state[sec.mid]||ok?'✓':`${subs(sec).filter(i=>state[i.id]).length}/${subs(sec).length}`):`${sc.d}/${sc.t}`;});}
function upProg(){const{d,t}=gScore();document.getElementById('pCount').textContent=`${d} / ${t}`;document.getElementById('pFill').style.width=`${(d/t*100).toFixed(1)}%`;const btn=document.getElementById('btnR'),bl=bls();if(bl.length>0){btn.className='btn btn-block';btn.textContent=`⛔ Récap (${bl.length} bloquant${bl.length>1?'s':''})` ;}else if(d===t){btn.className='btn btn-ok';btn.textContent='▶ Récap départ';}else{btn.className='btn btn-warn';btn.textContent=`⚠ Récap (${d}/${t})`;}}

function resetAll(){const mc=document.getElementById('mc');mc.className='modal m-warn';mc.innerHTML=`<div class="modal-handle"></div><h2 class="warn" style="margin-bottom:12px;">↺ Réinitialiser</h2><p style="text-align:center;color:rgba(255,255,255,0.65);font-size:13px;margin-bottom:20px;">Effacer toute la checklist ?</p><button class="modal-close danger" onclick="doReset()">Oui, tout effacer</button><button class="modal-close" style="margin-top:8px;" onclick="closeM()">Annuler</button>`;document.getElementById('ov').classList.add('active');}
function doReset(){closeM();state={};save();render();}

function showRecap(){
  const{d,t}=gScore(),bl=bls();
  const now=new Date(),h=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  let blH='';if(bl.length>0)blH='<div class="blockers">'+bl.map(b=>`<div class="blocker-item"><span class="blocker-icon">⛔</span><span class="blocker-text">${b.bl}</span></div>`).join('')+'</div>';
  let rec='<div class="modal-recap">';
  DATA.forEach(sec=>{const sc=sScore(sec),ok=sc.d===sc.t;const sb=subs(sec).filter(i=>i.bl&&!state[i.id]);const rc=sb.length>0?'r-block':ok?'r-done':'r-warn';const sl=sec.mid?(state[sec.mid]?'Validé ✓':ok?'✓ OK':`${subs(sec).filter(i=>state[i.id]).length}/${subs(sec).length}`):(ok?'✓ OK':`${sc.d}/${sc.t}`);rec+=`<div class="recap-row ${rc}"><div class="recap-dot"></div><div class="recap-name">${sec.b}</div><div class="recap-score">${sl}${sb.length>0?' ⛔':''}</div></div>`;});
  rec+=`</div><p style="text-align:center;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:12px;">${h}</p>`;
  const mc=document.getElementById('mc');
  if(bl.length>0){mc.className='modal m-block';mc.innerHTML=`<div class="modal-handle"></div><h2 class="block">⛔ Départ bloqué</h2><p class="modal-sub">Conditions non remplies</p>${blH}${rec}<button class="modal-close" onclick="closeM()">← Revenir compléter</button>`;}
  else if(d===t){mc.className='modal';mc.innerHTML=`<div class="modal-handle"></div><h2 class="ok">✓ Prêt au départ</h2><p class="modal-sub">Toutes les vérifications validées</p>${rec}<button class="modal-close" onclick="closeM()">Fermer</button>`;}
  else{mc.className='modal m-warn';mc.innerHTML=`<div class="modal-handle"></div><h2 class="warn">⚠ Incomplet</h2><p class="modal-sub">${d}/${t} sections — aucun bloquant</p>${rec}<button class="modal-close" onclick="closeM()">Fermer</button>`;}
  document.getElementById('ov').classList.add('active');
}
function closeOv(e){if(e.target===document.getElementById('ov'))closeM();}
function closeM(){document.getElementById('ov').classList.remove('active');}

function tick(){const n=new Date();document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;}
setInterval(tick,1000);tick();
load();render();
</script>

</body>
</html>

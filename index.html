<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Départ Train">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Checklist Départ Train — FRET</title>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2230; --border:#2a3445;
    --green:#00e676; --green-dim:#00c853; --green-glow:rgba(0,230,118,.15);
    --amber:#ffb300; --amber-glow:rgba(255,179,0,.15);
    --red:#ff4444; --red-glow:rgba(255,68,68,.15);
    --blue:#4fc3f7; --purple:#ce93d8;
    --text:#e0e8f0; --text-dim:#8899aa;
    --mono: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;min-height:100dvh;padding:0 0 calc(88px + env(safe-area-inset-bottom));}

/* Safe area pour la bottom bar */
.bottom-bar{padding:10px 16px calc(10px + env(safe-area-inset-bottom));}

/* HEADER */
header{background:var(–surface);border-bottom:2px solid var(–green);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,230,118,.1);}
.header-left{display:flex;align-items:center;gap:10px;}
.logo-badge{background:var(–green);color:#000;font-family:var(–mono);font-weight:900;font-size:10px;letter-spacing:2px;padding:3px 8px;border-radius:2px;}
header h1{font-family:var(–sans);font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase;}
.clock{font-family:var(–mono);font-size:17px;color:var(–green);letter-spacing:2px;}

/* TRAIN INFO */
.train-info{background:var(–surface2);border-bottom:1px solid var(–border);padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.info-field{display:flex;align-items:center;gap:6px;}
.info-label{font-family:var(–mono);font-size:10px;color:var(–text-dim);text-transform:uppercase;letter-spacing:1px;}
.info-input{background:var(–bg);border:1px solid var(–border);color:var(–amber);font-family:var(–mono);font-size:14px;padding:3px 8px;border-radius:3px;width:86px;text-align:center;outline:none;transition:border-color .2s;}
.info-input:focus{border-color:var(–amber);box-shadow:0 0 6px var(–amber-glow);}
.info-input.wide{width:130px;}

/* CHRONO */
.chrono-bar{background:var(–surface2);border-bottom:1px solid var(–border);padding:8px 16px;display:flex;align-items:center;gap:10px;}
.chrono-label{font-family:var(–mono);font-size:10px;color:var(–text-dim);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
.chrono-display{font-family:var(–mono);font-size:22px;letter-spacing:3px;min-width:66px;text-align:center;transition:color .3s;}
.chrono-display.idle   {color:var(–text-dim);}
.chrono-display.run    {color:var(–amber);}
.chrono-display.done   {color:var(–green);}
.chrono-display.over   {color:var(–red);animation:blink .8s step-end infinite;}
@keyframes blink{50%{opacity:.3;}}
.chrono-prog{flex:1;}
.chrono-bg{background:var(–border);border-radius:2px;height:4px;overflow:hidden;}
.chrono-fill{height:100%;border-radius:2px;transition:width .5s linear,background .3s;}
.chrono-btns{display:flex;gap:6px;flex-shrink:0;}
.cbtn{font-family:var(–mono);font-size:11px;padding:5px 10px;border-radius:3px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;letter-spacing:1px;}
.cbtn-start{background:rgba(255,179,0,.2);color:var(–amber);border:1px solid var(–amber);}
.cbtn-start:active{background:rgba(255,179,0,.35);}
.cbtn-set{background:rgba(79,195,247,.12);color:var(–blue);border:1px solid var(–blue);}
.cbtn-set:active{background:rgba(79,195,247,.25);}
.cbtn-rst{background:var(–surface);color:var(–text-dim);border:1px solid var(–border);}
.cbtn-rst:active{background:var(–border);}

/* PROGRESS */
.progress-wrap{padding:12px 16px 4px;}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-label{font-family:var(–sans);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(–text-dim);}
.progress-count{font-family:var(–mono);font-size:14px;color:var(–green);}
.progress-bar-bg{background:var(–surface2);border-radius:2px;height:5px;overflow:hidden;border:1px solid var(–border);}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(–green-dim),var(–green));border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(–green-glow);}

/* MINUTE BANNER */
.minute-banner{margin:10px 16px 0;background:rgba(255,179,0,.06);border:1px solid rgba(255,179,0,.3);border-left:4px solid var(–amber);border-radius:4px;padding:9px 13px;display:flex;gap:9px;align-items:flex-start;}
.minute-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.minute-text strong{font-family:var(–sans);font-weight:700;font-size:13px;color:var(–amber);display:block;margin-bottom:1px;}
.minute-text span{font-size:11px;color:var(–text-dim);line-height:1.4;}

/* SECTIONS */
.section{margin:10px 16px 0;border-radius:6px;overflow:hidden;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;border-radius:6px;transition:filter .15s;}
.section:not(.collapsed) .section-header{border-radius:6px 6px 0 0;}
.section-header:active{filter:brightness(1.15);}

.sec-ps    .section-header{background:rgba(255,152,0,.15); border:1px solid rgba(255,152,0,.45);}
.sec-prep  .section-header{background:rgba(78,145,214,.18);border:1px solid rgba(78,145,214,.5);}
.sec-brief .section-header{background:rgba(76,175,80,.15); border:1px solid rgba(76,175,80,.45);}
.sec-bf    .section-header{background:rgba(206,147,216,.15);border:1px solid rgba(206,147,216,.45);}
.sec-ppe-b .section-header{background:rgba(0,230,118,.18); border:1px solid rgba(0,230,118,.5);}
.sec-ppe-s .section-header{background:rgba(0,200,100,.12); border:1px solid rgba(0,200,100,.4);}
.sec-par   .section-header{background:rgba(79,195,247,.15);border:1px solid rgba(79,195,247,.45);}
.sec-aum   .section-header{background:rgba(255,179,0,.15); border:1px solid rgba(255,179,0,.45);}
.sec-hd    .section-header{background:rgba(255,68,68,.13); border:1px solid rgba(255,68,68,.4);}

.section-body{border:1px solid var(–border);border-top:none;border-radius:0 0 6px 6px;background:var(–surface);}
.section.collapsed .section-body{display:none;}
.section-title-wrap{display:flex;align-items:center;gap:10px;}
.section-badge{font-family:var(–mono);font-size:10px;font-weight:bold;padding:2px 7px;border-radius:2px;letter-spacing:1px;white-space:nowrap;}
.sec-ps    .section-badge{background:rgba(255,152,0,.22); color:#ffb74d;border:1px solid #ffb74d;}
.sec-prep  .section-badge{background:rgba(78,145,214,.25);color:#7ab3e8;border:1px solid #7ab3e8;}
.sec-brief .section-badge{background:rgba(76,175,80,.2);  color:#81c784;border:1px solid #81c784;}
.sec-bf    .section-badge{background:rgba(206,147,216,.2);color:var(–purple);border:1px solid var(–purple);}
.sec-ppe-b .section-badge{background:rgba(0,230,118,.2);  color:var(–green);border:1px solid var(–green);}
.sec-ppe-s .section-badge{background:rgba(0,200,100,.15); color:#70e0a0;border:1px solid #70e0a0;}
.sec-par   .section-badge{background:rgba(79,195,247,.2); color:var(–blue);border:1px solid var(–blue);}
.sec-aum   .section-badge{background:rgba(255,179,0,.2);  color:var(–amber);border:1px solid var(–amber);}
.sec-hd    .section-badge{background:rgba(255,68,68,.18); color:var(–red);border:1px solid var(–red);}

.section-title{font-family:var(–sans);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;}
.section-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.section-progress{font-family:var(–mono);font-size:11px;color:var(–text-dim);}
.chevron{color:var(–text-dim);font-size:11px;transition:transform .2s;}
.section.collapsed .chevron{transform:rotate(-90deg);}

/* MASTER ITEM */
.master-item{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s;border-bottom:1px solid var(–border);}
.master-item:active{background:var(–surface2);}
.master-item.checked{opacity:.5;}
.master-item.checked .master-label{text-decoration:line-through;color:var(–text-dim);}
.master-item .checkbox{width:24px;height:24px;border:2px solid var(–amber);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.master-item.checked .checkbox{background:var(–green);border-color:var(–green);}
.master-item .checkmark{display:none;color:#000;font-size:14px;font-weight:900;}
.master-item.checked .checkmark{display:block;}
.master-label{font-family:var(–sans);font-size:14px;font-weight:700;flex:1;line-height:1.3;}
.master-hint{font-family:var(–body);font-size:11px;color:var(–text-dim);margin-top:2px;line-height:1.4;}

/* SUBMENU TOGGLE */
.submenu-toggle{padding:7px 14px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-family:var(–mono);font-size:10px;color:var(–blue);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(–border);-webkit-tap-highlight-color:transparent;transition:background .12s;}
.submenu-toggle:active{background:var(–surface2);}
.submenu-arrow{transition:transform .2s;font-size:9px;}
.submenu-open .submenu-arrow{transform:rotate(90deg);}
.submenu{display:none;background:rgba(13,17,23,.4);}

/* SUB-GROUP */
.sub-group-label{padding:6px 14px 3px;font-family:var(–mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–text-dim);background:var(–surface2);border-bottom:1px solid var(–border);}

/* ITEMS */
.check-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(–border);cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;}
.check-item:last-child{border-bottom:none;}
.check-item:active{background:var(–surface2);}
.check-item.checked{opacity:.45;}
.check-item.checked .item-label{text-decoration:line-through;color:var(–text-dim);}
.checkbox{width:24px;height:24px;border:2px solid var(–border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.check-item.checked .checkbox{background:var(–green);border-color:var(–green);}
.checkmark{display:none;color:#000;font-size:14px;font-weight:900;line-height:1;}
.check-item.checked .checkmark{display:block;}
.item-content{flex:1;}
.item-label{font-family:var(–sans);font-size:14px;font-weight:600;line-height:1.25;}
.item-detail{font-family:var(–body);font-size:11px;color:var(–text-dim);margin-top:2px;line-height:1.4;}
.item-tag{display:inline-block;font-family:var(–mono);font-size:8.5px;letter-spacing:1px;padding:1px 5px;border-radius:2px;margin-top:3px;text-transform:uppercase;}
.tag-oblig{background:rgba(255,68,68,.12);color:#ff8888;border:1px solid rgba(255,68,68,.3);}
.tag-cond {background:rgba(255,179,0,.1); color:#ffcc55;border:1px solid rgba(255,179,0,.3);}
.formula{display:inline-block;font-family:var(–mono);font-size:13px;font-weight:bold;background:rgba(0,230,118,.1);color:var(–green);border:1px solid rgba(0,230,118,.4);padding:1px 8px;border-radius:3px;margin-top:3px;}

/* NOTE */
.section-note{padding:7px 14px;background:rgba(255,179,0,.04);border-top:1px solid var(–border);font-size:11px;color:var(–text-dim);line-height:1.5;}
.section-note .warn{color:var(–amber);font-weight:600;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(–surface);border-top:2px solid var(–border);padding:10px 16px;display:flex;gap:10px;z-index:100;}
.btn{flex:1;padding:13px;border:none;border-radius:4px;font-family:var(–sans);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.btn-reset{background:var(–surface2);color:var(–text-dim);border:1px solid var(–border);}
.btn-reset:active{background:var(–border);}
.btn-ok  {background:var(–green);color:#000;box-shadow:0 0 16px var(–green-glow);flex:2;font-size:13px;}
.btn-ok:active{background:var(–green-dim);}
.btn-warn{background:rgba(255,179,0,.16);color:var(–amber);border:1px solid var(–amber);flex:2;font-size:12px;}
.btn-warn:active{background:rgba(255,179,0,.28);}
.btn-block{background:rgba(255,68,68,.15);color:var(–red);border:1px solid var(–red);flex:2;font-size:12px;}
.btn-block:active{background:rgba(255,68,68,.25);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(–surface);border:1px solid var(–green);border-bottom:none;border-radius:14px 14px 0 0;padding:20px 18px 32px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,230,118,.18);animation:slideUp .22s ease;}
.modal.m-warn {border-color:var(–amber);box-shadow:0 -8px 40px rgba(255,179,0,.15);}
.modal.m-block{border-color:var(–red);  box-shadow:0 -8px 40px rgba(255,68,68,.15);}
@keyframes slideUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.modal h2{font-family:var(–sans);font-size:18px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:3px;}
.modal h2.ok   {color:var(–green);}
.modal h2.warn {color:var(–amber);}
.modal h2.block{color:var(–red);}
.modal-sub{font-family:var(–mono);font-size:11px;color:var(–text-dim);text-align:center;margin-bottom:14px;}

/* Infos train dans modal */
.modal-traininfo{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.mti{background:var(–bg);border:1px solid var(–border);border-radius:4px;padding:5px 10px;flex:1;min-width:70px;}
.mti .l{font-family:var(–mono);font-size:9px;color:var(–text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px;}
.mti .v{font-family:var(–mono);font-size:14px;color:var(–amber);}

/* Bloquants */
.blockers{margin-bottom:14px;}
.blocker-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.35);border-radius:4px;margin-bottom:6px;}
.blocker-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.blocker-text{font-family:var(–sans);font-size:14px;font-weight:600;color:#ff8888;line-height:1.3;}

/* Récap sections */
.modal-recap{margin-bottom:14px;}
.recap-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:4px;margin-bottom:5px;}
.r-done  {background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.22);}
.r-warn  {background:rgba(255,179,0,.07);border:1px solid rgba(255,179,0,.22);}
.r-block {background:rgba(255,68,68,.07); border:1px solid rgba(255,68,68,.25);}
.recap-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.r-done  .recap-dot{background:var(–green);box-shadow:0 0 5px var(–green-glow);}
.r-warn  .recap-dot{background:var(–amber);}
.r-block .recap-dot{background:var(–red);}
.recap-name {font-family:var(–sans);font-size:12px;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:.5px;}
.recap-score{font-family:var(–mono);font-size:11px;color:var(–text-dim);}
.r-done .recap-score{color:var(–green);}
.r-block .recap-score{color:var(–red);}

.modal-close{display:block;width:100%;padding:13px;background:var(–surface2);color:var(–text-dim);border:1px solid var(–border);border-radius:4px;font-family:var(–sans);font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-align:center;margin-top:4px;}
.modal-close:active{background:var(–border);}

/* CHRONO SET MODAL */
.chrono-set-modal{background:var(–surface);border:1px solid var(–blue);border-bottom:none;border-radius:14px 14px 0 0;padding:20px 18px 32px;width:100%;max-width:360px;box-shadow:0 -8px 40px rgba(79,195,247,.15);animation:slideUp .22s ease;}
.chrono-set-modal h3{font-family:var(–sans);font-size:18px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(–blue);margin-bottom:18px;text-align:center;}
.dur-custom-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;justify-content:center;}
.dur-custom-label{font-family:var(–mono);font-size:12px;color:var(–text-dim);flex-shrink:0;}
.dur-custom-input{background:var(–bg);border:1px solid var(–border);color:var(–amber);font-family:var(–mono);font-size:26px;padding:8px 12px;border-radius:3px;width:80px;text-align:center;outline:none;}
.dur-custom-input:focus{border-color:var(–amber);}
.dur-unit{font-family:var(–mono);font-size:13px;color:var(–text-dim);}
.dur-apply{width:100%;padding:13px;background:var(–blue);color:#000;border:none;border-radius:4px;font-family:var(–sans);font-weight:900;font-size:15px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}

body::after{content:’’;position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,230,118,.4),transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:999;}
@keyframes scan{from{top:-2px;}to{top:100vh;}}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-badge">FRET</div>
    <h1>Départ Train</h1>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="train-info">
  <div class="info-field"><span class="info-label">Train N°</span><input class="info-input" id="numTrain" placeholder="——" maxlength="6" inputmode="numeric"></div>
  <div class="info-field"><span class="info-label">Voie</span><input class="info-input" id="voie" placeholder="——" maxlength="4"></div>
  <div class="info-field"><span class="info-label">HD</span><input class="info-input" id="hd" placeholder="HH:MM" maxlength="5" inputmode="numeric" oninput="hdAutoColon(this)"></div>
  <div class="info-field"><span class="info-label">Ligne</span><input class="info-input wide" id="ligne" placeholder="ex: Cham.-Mod." maxlength="14"></div>
</div>

<!-- CHRONO FREINS -->

<div class="chrono-bar">
  <span class="chrono-label">⏱ Freins</span>
  <div class="chrono-display idle" id="chronoDisplay">--:--</div>
  <div class="chrono-prog">
    <div class="chrono-bg"><div class="chrono-fill" id="chronoFill" style="width:0%;background:var(--amber)"></div></div>
  </div>
  <div class="chrono-btns">
    <button class="cbtn cbtn-start" id="cbtnStart" onclick="chronoToggle()">START</button>
    <button class="cbtn cbtn-set"   onclick="openChronoSet()">SET</button>
    <button class="cbtn cbtn-rst"   onclick="chronoReset()">RST</button>
  </div>
</div>

<div class="minute-banner">
  <div class="minute-icon">⏱</div>
  <div class="minute-text">
    <strong>Minute d'arrêt — Gestion des conditions de mise en mouvement</strong>
    <span>Analyser · Identifier les menaces · Déterminer le projet d'actions · Décider du type de marche</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-header">
    <span class="progress-label">Progression</span>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="checklistContainer"></div>

<div class="bottom-bar">
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <button class="btn" id="btnDepart" onclick="showRecap()">▶ Récap départ</button>
</div>

<!-- MODAL RÉCAP -->

<div class="modal-overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- MODAL CHRONO SET -->

<div class="modal-overlay" id="chronoOverlay" onclick="closeChronoOverlay(event)">
  <div class="chrono-set-modal" id="chronoSetModal">
    <h3>⏱ Durée minuteur</h3>
    <div class="dur-custom-row">
      <span class="dur-custom-label">Durée :</span>
      <input class="dur-custom-input" id="durCustom" type="number" min="1" max="60" value="4" inputmode="numeric">

// ═══════════════════════════════════════════════════════════════
//  CHRONO
// ═══════════════════════════════════════════════════════════════

let chronoTarget  = 4 * 60;
let chronoElapsed = 0;
let chronoRunning = false;
let chronoIval    = null;
let chronoPendingDur = 4;

function chronoTick() {
  chronoElapsed++;
  renderChrono();
  if(chronoElapsed === chronoTarget) {
    // Bip sonore
    try {
      const ctx=new AudioContext();
      for(let i=0;i<3;i++){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=i===2?1100:880;
        const t=ctx.currentTime+i*0.28;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.4,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        o.start(t);o.stop(t+0.25);
      }
    } catch(e){}
    // Flash visuel
    flashDone();
  }
}

function flashDone(){
  const bar=document.querySelector('.chrono-bar');
  if(!bar)return;
  let count=0;
  const orig=bar.style.background;
  const iv=setInterval(()=>{
    bar.style.background=count%2===0?'rgba(0,230,118,0.25)':''  ;
    if(++count>5){ clearInterval(iv); bar.style.background=''; }
  },250);
}

function renderChrono() {
  const disp=document.getElementById('chronoDisplay');
  const fill=document.getElementById('chronoFill');
  const btn =document.getElementById('cbtnStart');
  const targetMin=Math.floor(chronoTarget/60);
  const targetSec=chronoTarget%60;

  if (!chronoRunning && chronoElapsed===0) {
    disp.textContent=`${String(targetMin).padStart(2,'0')}:${String(targetSec).padStart(2,'0')}`;
    disp.className='chrono-display idle';
    fill.style.width='0%';
    btn.textContent='START';
    return;
  }
  const m=Math.floor(chronoElapsed/60), s=chronoElapsed%60;
  disp.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct=Math.min(chronoElapsed/chronoTarget*100,100);
  fill.style.width=pct+'%';

  if (chronoElapsed < chronoTarget) {
    disp.className='chrono-display run';
    fill.style.background='var(--amber)';
  } else {
    disp.className='chrono-display done';
    fill.style.background='var(--green)';
  }
  btn.textContent=chronoRunning?'STOP':'REPRISE';
}

function chronoToggle() {
  if (chronoRunning) { clearInterval(chronoIval); chronoRunning=false; }
  else               { chronoRunning=true; chronoIval=setInterval(chronoTick,1000); }
  renderChrono();
}
function chronoReset() {
  clearInterval(chronoIval); chronoRunning=false; chronoElapsed=0; renderChrono();
}

function openChronoSet() {
  document.getElementById('durCustom').value=Math.round(chronoTarget/60);
  document.getElementById('chronoOverlay').classList.add('active');
}
function applyDur() {
  const v=parseInt(document.getElementById('durCustom').value)||4;
  chronoTarget=Math.max(1,Math.min(60,v))*60;
  chronoReset();
  document.getElementById('chronoOverlay').classList.remove('active');
}
function closeChronoOverlay(e){ if(!e||e.target===document.getElementById('chronoOverlay')) document.getElementById('chronoOverlay').classList.remove('active'); }

//  HELPERS
// ═══════════════════════════════════════════════════════════════

function subItems(sec){return sec.groups.flatMap(g=>g.items);}
function allItems(){return CHECKLIST.flatMap(s=>subItems(s));}

function sectionScore(sec){
  if(sec.masterId){
    const allDone=subItems(sec).every(i=>state[i.id]);
    return{done:(state[sec.masterId]||allDone)?1:0,total:1};
  }
  const items=subItems(sec);
  return{done:items.filter(i=>state[i.id]).length,total:items.length};
}
function globalScore(){
  let done=0,total=0;
  CHECKLIST.forEach(sec=>{const s=sectionScore(sec);done+=s.done;total+=s.total;});
  return{done,total};
}

// Retourne les messages bloquants actifs
function getBlockers(){
  return allItems().filter(i=>i.blocker&&!state[i.id]);
}

// ═══════════════════════════════════════════════════════════════

let state={};
function loadState(){try{const s=localStorage.getItem('cl-fret-v7');if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem('cl-fret-v7',JSON.stringify(state));}catch(e){}}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════

function render(){
  const container=document.getElementById('checklistContainer');
  container.innerHTML='';
  CHECKLIST.forEach(sec=>{
    const score=sectionScore(sec);
    const allOk=score.done===score.total;
    const div=document.createElement('div');
    div.className=`section ${sec.secClass}`;
    div.id='sec-'+sec.id;

    let progressText;
    if(sec.masterId){
      const sd=subItems(sec).filter(i=>state[i.id]).length;
      progressText=(state[sec.masterId]||allOk)?'✓':`${sd}/${subItems(sec).length}`;
    } else {
      progressText=`${score.done}/${score.total}`;
    }

    let bodyInner='';
    if(sec.masterId){
      const mc=state[sec.masterId]?'checked':'';
      const subOpen=state['_sub_'+sec.id];
      bodyInner=`
        <div class="master-item ${mc}" id="master-${sec.id}" onclick="toggleMaster('${sec.id}')">
          <div class="checkbox"><span class="checkmark">✓</span></div>
          <div style="flex:1">
            <div class="master-label">${sec.masterLabel}</div>
            <div class="master-hint">${sec.masterHint}</div>
          </div>
        </div>
        <div class="submenu-toggle ${subOpen?'submenu-open':''}" id="stoggle-${sec.id}" onclick="toggleSub('${sec.id}')">
          <span class="submenu-arrow">▶</span> Détail des vérifications
        </div>
        <div class="submenu" id="smenu-${sec.id}" style="${subOpen?'':'display:none'}">
          ${renderGroups(sec)}
        </div>`;
    } else {
      bodyInner=renderGroups(sec);
    }

    const noteHtml=sec.note?`<div class="section-note"><span class="warn">⚠</span> ${sec.note}</div>`:'';
    div.innerHTML=`
      <div class="section-header" onclick="toggleSec('${sec.id}')">
        <div class="section-title-wrap">
          <span class="section-badge">${sec.badge}</span>
          <span class="section-title">${sec.title}</span>
        </div>
        <div class="section-meta">
          <span class="section-progress" id="sp-${sec.id}">${progressText}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="section-body">${bodyInner}${noteHtml}</div>`;
    container.appendChild(div);
  });
  updateProgress();
}

function renderGroups(sec){
  return sec.groups.map(g=>{
    const lbl=g.label?`<div class="sub-group-label">${g.label}</div>`:'';
    return lbl+g.items.map(item=>{
      const ck=state[item.id]?'checked':'';
      const tag=item.tag?`<span class="item-tag tag-${item.tag}">${item.tag==='oblig'?'⚠ Obligatoire':'◈ Conditionnel'}</span>`:'';
      const fml=item.formula?`<div class="formula">${item.formula}</div>`:'';
      return `
        <div class="check-item ${ck}" id="item-${item.id}" onclick="toggleItem('${item.id}')">
          <div class="checkbox"><span class="checkmark">✓</span></div>
          <div class="item-content">
            <div class="item-label">${item.label}</div>
            ${item.detail?`<div class="item-detail">${item.detail}</div>`:''}
            ${fml}${tag}
          </div>
        </div>`;
    }).join('');
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function toggleItem(id){
  state[id]=!state[id];saveState();
  const el=document.getElementById('item-'+id);
  state[id]?el.classList.add('checked'):el.classList.remove('checked');
  refreshCounters();updateProgress();
}
function toggleMaster(secId){
  const sec=CHECKLIST.find(s=>s.id===secId);
  state[sec.masterId]=!state[sec.masterId];saveState();
  const el=document.getElementById('master-'+secId);
  state[sec.masterId]?el.classList.add('checked'):el.classList.remove('checked');
  refreshCounters();updateProgress();
}
function toggleSub(secId){
  const key='_sub_'+secId;state[key]=!state[key];saveState();
  const menu=document.getElementById('smenu-'+secId);
  const tgl=document.getElementById('stoggle-'+secId);
  if(state[key]){menu.style.display='block';tgl.classList.add('submenu-open');}
  else          {menu.style.display='none'; tgl.classList.remove('submenu-open');}
}
function toggleSec(id){document.getElementById('sec-'+id).classList.toggle('collapsed');}

function refreshCounters(){
  CHECKLIST.forEach(sec=>{
    const score=sectionScore(sec);
    const allOk=score.done===score.total;
    const el=document.getElementById('sp-'+sec.id);
    if(!el)return;
    if(sec.masterId){
      const sd=subItems(sec).filter(i=>state[i.id]).length;
      el.textContent=(state[sec.masterId]||allOk)?'✓':`${sd}/${subItems(sec).length}`;
    } else {
      el.textContent=`${score.done}/${score.total}`;
    }
  });
}

function updateProgress(){
  const{done,total}=globalScore();
  document.getElementById('progressCount').textContent=`${done} / ${total}`;
  document.getElementById('progressFill').style.width=`${(done/total*100).toFixed(1)}%`;
  const btn=document.getElementById('btnDepart');
  const blockers=getBlockers();
  if(blockers.length>0){
    btn.className='btn btn-block';btn.textContent=`⛔ Récap (${blockers.length} bloquant${blockers.length>1?'s':''})`;
  } else if(done===total){
    btn.className='btn btn-ok';btn.textContent='▶ Récap départ';
  } else {
    btn.className='btn btn-warn';btn.textContent=`⚠ Récap (${done}/${total})`;
  }
}

//  RÉCAP — pas de confirmation, juste un résumé + fermeture
// ═══════════════════════════════════════════════════════════════

function showRecap(){
  const{done,total}=globalScore();
  const blockers=getBlockers();
  const numTrain=document.getElementById('numTrain').value||'—';
  const voie    =document.getElementById('voie').value    ||'—';
  const hd      =document.getElementById('hd').value      ||'—';
  const now=new Date();
  const heure=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const infoHtml=`
    <div class="modal-traininfo">
      <div class="mti"><div class="l">Train</div><div class="v">${numTrain}</div></div>
      <div class="mti"><div class="l">Voie</div><div class="v">${voie}</div></div>
      <div class="mti"><div class="l">HD</div><div class="v">${hd}</div></div>
      <div class="mti"><div class="l">Heure</div><div class="v">${heure}</div></div>
    </div>`;

  // Bloquants
  let blockersHtml='';
  if(blockers.length>0){
    blockersHtml='<div class="blockers">'+blockers.map(b=>`
      <div class="blocker-item">
        <span class="blocker-icon">⛔</span>
        <span class="blocker-text">${b.blocker}</span>
      </div>`).join('')+'</div>';
  }

  // Récap par section
  let recapHtml='<div class="modal-recap">';
  CHECKLIST.forEach(sec=>{
    const s=sectionScore(sec);
    const isDone=s.done===s.total;
    // Y a-t-il des bloquants dans cette section ?
    const secBlockers=subItems(sec).filter(i=>i.blocker&&!state[i.id]);
    const rowClass=secBlockers.length>0?'r-block':isDone?'r-done':'r-warn';

    let scoreLabel;
    if(sec.masterId){
      if(state[sec.masterId]) scoreLabel='Case directe ✓';
      else{
        const sd=subItems(sec).filter(i=>state[i.id]).length;
        scoreLabel=isDone?`✓ OK`:`${sd}/${subItems(sec).length}`;
      }
    } else {
      scoreLabel=isDone?'✓ OK':`${s.done}/${s.total}`;
    }

    recapHtml+=`
      <div class="recap-row ${rowClass}">
        <div class="recap-dot"></div>
        <div class="recap-name">${sec.badge}</div>
        <div class="recap-score">${scoreLabel}${secBlockers.length>0?' ⛔':''}</div>
      </div>`;
  });
  recapHtml+='</div>';

  const content=document.getElementById('modalContent');

  if(blockers.length>0){
    content.className='modal m-block';
    content.innerHTML=`
      <h2 class="block">⛔ Départ bloqué</h2>
      <p class="modal-sub">Conditions obligatoires non remplies</p>
      ${infoHtml}
      ${blockersHtml}
      ${recapHtml}
      <button class="modal-close" onclick="closeModal()">← Revenir compléter</button>`;
  } else if(done===total){
    content.className='modal';
    content.innerHTML=`
      <h2 class="ok">✓ Prêt au départ</h2>
      <p class="modal-sub">Toutes les vérifications sont validées</p>
      ${infoHtml}
      ${recapHtml}
      <button class="modal-close" onclick="closeModal()">Fermer</button>`;
  } else {
    content.className='modal m-warn';
    content.innerHTML=`
      <h2 class="warn">⚠ Incomplet</h2>
      <p class="modal-sub">${done}/${total} sections validées — aucun bloquant</p>
      ${infoHtml}
      ${recapHtml}
      <button class="modal-close" onclick="closeModal()">Fermer</button>`;
  }

  document.getElementById('overlay').classList.add('active');
}

function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('active');}

    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(tick,1000);tick();
loadState();render();
</script>

</body>
</html>

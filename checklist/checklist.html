<title>Checklist Départ Train — FRET</title>
<style>
/* VARIABLES */
:root {
  --green: #1a7a3c;
  --green-light: #2da84f;
  --amber: #ff9f0a;
  --red:   #ff453a;
  --teal:  #5ac8fa;
  --blue:  #3478f6;
  --mono: ui-monospace,'SF Mono',Menlo,monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}
html { background-color:#1c1c1e!important; min-height:100%; }
body {
  font-family:var(--sans); color:#fff; min-height:100dvh;
  background-color:#1c1c1e!important;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-width='0.4' stroke-opacity='0.06'%3E%3Cpath d='M0 60L60 0M-10 10L10 -10M50 70L70 50'/%3E%3C/g%3E%3C/svg%3E")!important;
  background-size:60px 60px!important;
}
/* VUES */
.view { display:none; min-height:100dvh; }
.view.active { display:block; }
.view.active#view-home { display:flex; flex-direction:column; }
#view-home { padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px); }
#view-depart { padding-bottom:calc(84px + env(safe-area-inset-bottom)); }

/* ACCUEIL */
.home-header { padding:30px 24px 20px; text-align:center; }
.home-logo { display:inline-flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.14); border-radius:14px; padding:8px 16px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); margin-bottom:20px; }
.home-logo-badge { font-family:var(–mono); font-weight:900; font-size:11px; letter-spacing:2px; color:#fff; background:linear-gradient(135deg,#2da84f,#1a7a3c); padding:4px 10px; border-radius:7px; border:1px solid rgba(255,255,255,0.2); box-shadow:inset 0 1px 0 rgba(255,255,255,0.3); }
.home-logo-text { font-size:13px; font-weight:600; color:rgba(255,255,255,0.8); letter-spacing:0.5px; }
.home-title { font-size:28px; font-weight:800; color:#fff; letter-spacing:-0.5px; line-height:1.15; margin-bottom:6px; }
.home-sub { font-family:var(–mono); font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1px; text-transform:uppercase; }
.home-clock { font-family:var(–mono); font-size:22px; font-weight:700; color:#2da84f; letter-spacing:2px; margin-top:16px; }
.home-cards { padding:8px 20px; display:flex; flex-direction:column; gap:14px; flex:1; }

/* CARTES MENU */
button.menu-card { display:block; width:100%; text-align:left; border:none; cursor:pointer; user-select:none; position:relative; border-radius:20px; overflow:hidden; backdrop-filter:blur(30px) saturate(200%); -webkit-backdrop-filter:blur(30px) saturate(200%); border:1px solid rgba(255,255,255,0.22); box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.28),inset 0 -1px 0 rgba(255,255,255,0.06),0 12px 40px rgba(0,0,0,0.5); transition:transform .2s ease; -webkit-tap-highlight-color:transparent; touch-action:manipulation; font-family:var(–sans); font-size:inherit; color:#fff; padding:22px 22px 20px; }
button.menu-card:active { transform:scale(0.975); }
button.menu-card::before { content:’’; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:linear-gradient(135deg,rgba(255,255,255,0.28) 0%,rgba(255,255,255,0.10) 18%,transparent 40%); }
.menu-card-depart { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(20,60,180,0.25) 0%,rgba(20,60,180,0) 60%); }
.menu-card-proc { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(255,69,58,0.2) 0%,rgba(255,69,58,0) 60%); }
.mc-icon { font-size:32px; margin-bottom:10px; display:block; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
.mc-badge { font-family:var(–mono); font-size:9px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border-radius:5px; display:inline-block; margin-bottom:8px; }
.mc-badge-depart { background:rgba(52,120,246,0.2); border:1px solid rgba(52,120,246,0.4); color:#93c5fd; }
.mc-badge-proc { background:rgba(255,69,58,0.15); border:1px solid rgba(255,69,58,0.35); color:#fca5a5; }
.mc-title { font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.3px; line-height:1.2; margin-bottom:6px; }
.mc-desc { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.5; }
.mc-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.mc-tag { font-family:var(–mono); font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:0.5px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14); color:rgba(255,255,255,0.55); }
.mc-arrow { position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:20px; color:rgba(255,255,255,0.3); }

/* BOUTON RETOUR */
.back-btn { display:inline-flex; align-items:center; gap:6px; font-family:var(–mono); font-size:11px; font-weight:700; color:rgba(255,255,255,0.7); letter-spacing:0.5px; cursor:pointer; padding:4px 0; -webkit-tap-highlight-color:transparent; touch-action:manipulation; background:none; border:none; }
.back-btn:active { color:#fff; }

/* CHECKLIST */
.glass-card { background:rgba(255,255,255,0.07); -webkit-backdrop-filter:blur(20px) saturate(180%); backdrop-filter:blur(20px) saturate(180%); border:1px solid rgba(255,255,255,0.22); box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.28),inset 0 -1px 0 rgba(255,255,255,0.06),0 8px 32px rgba(0,0,0,0.45),0 2px 8px rgba(0,0,0,0.3); }
.chrono-bar { margin:12px 16px 0; border-radius:16px; padding:10px 14px; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.02); background-image:linear-gradient(135deg,rgba(255,255,255,0.10) 0%,rgba(255,255,255,0.02) 30%,rgba(255,255,255,0.0) 60%); -webkit-backdrop-filter:blur(30px) saturate(200%); backdrop-filter:blur(30px) saturate(200%); border:1px solid rgba(255,255,255,0.22); box-shadow:inset 0 0 12px rgba(255,255,255,0.15),inset 0 1px 0 rgba(255,255,255,0.18),0 6px 24px rgba(0,0,0,0.35); }
.chrono-label { font-family:var(–mono); font-size:9px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1px; flex-shrink:0; }
.chrono-display { font-family:var(–mono); font-size:21px; letter-spacing:2px; min-width:62px; text-align:center; font-weight:600; }
.chrono-display.idle { color:rgba(255,255,255,0.45); }
.chrono-display.run { color:var(–amber); }
.chrono-display.done { color:var(–green-light); }
.chrono-prog { flex:1; }
.chrono-bg { background:rgba(255,255,255,0.12); border-radius:3px; height:3px; overflow:hidden; }
.chrono-fill { height:100%; border-radius:3px; transition:width .5s linear,background .3s; }
.chrono-btns { display:flex; gap:6px; flex-shrink:0; }
.cbtn { font-family:var(–mono); font-size:11px; font-weight:700; padding:7px 12px; border-radius:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; -webkit-backdrop-filter:blur(30px) saturate(200%); backdrop-filter:blur(30px) saturate(200%); border:1px solid rgba(255,255,255,0.28); box-shadow:inset 0 0 10px rgba(255,255,255,0.15),inset 0 1px 0 rgba(255,255,255,0.2),0 3px 10px rgba(0,0,0,0.35); background:linear-gradient(135deg,rgba(255,255,255,0.10) 0%,rgba(255,255,255,0.02) 40%,rgba(255,255,255,0.0) 100%); color:#fff; }
.cbtn-start { color:#ffdd88; border-color:rgba(255,200,80,0.45); }
.cbtn-start.running { color:#ffaaaa; border-color:rgba(255,100,80,0.45); }
.cbtn-set { color:#88bbff; border-color:rgba(80,140,255,0.45); }
.cbtn-rst { color:rgba(255,255,255,0.85); }
.progress-wrap { padding:12px 16px 6px; }
.progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.progress-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5); }
.progress-count { font-family:var(–mono); font-size:13px; color:var(–green-light); font-weight:600; }
.progress-bar-bg { background:rgba(255,255,255,0.12); border-radius:3px; height:4px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#1a7a3c,#2da84f); border-radius:3px; transition:width .4s ease; }
.minute-banner { margin:10px 16px 0; border-radius:14px; padding:10px 14px; display:flex; gap:9px; align-items:flex-start; background:rgba(255,159,10,0.1); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border:1px solid rgba(255,159,10,0.35); border-left:3px solid var(–amber); box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.2),0 4px 16px rgba(0,0,0,0.3); }
.minute-icon { font-size:15px; flex-shrink:0; margin-top:2px; }
.minute-text strong { font-weight:700; font-size:12px; color:#ffcc66; display:block; margin-bottom:2px; }
.minute-text span { font-size:11px; color:rgba(255,255,255,0.75); line-height:1.4; }
.cl-section { margin:10px 16px 0; border-radius:16px; overflow:hidden; transition:transform .25s ease,box-shadow .25s ease; }
.cl-section:hover { transform:translateY(-3px) scale(1.005); box-shadow:0 16px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.12); }
.cl-section-header { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; cursor:pointer; user-select:none; border-radius:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.18); transition:box-shadow .25s ease; position:relative; }
.cl-section:not(.collapsed) .cl-section-header { border-radius:16px 16px 0 0; border-bottom-color:rgba(255,255,255,0.08); }
.cl-section-header::before { content:’’; position:absolute; inset:0; border-radius:inherit; pointer-events:none; }
.sec-ps   .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(30,58,138,0.5) 0%,rgba(30,58,138,0) 60%); }
.sec-prep .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(29,78,216,0.5) 0%,rgba(29,78,216,0) 60%); }
.sec-brief .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(37,99,235,0.5) 0%,rgba(37,99,235,0) 60%); }
.sec-bf   .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(59,130,246,0.5) 0%,rgba(59,130,246,0) 60%); }
.sec-ppe-b .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(96,165,250,0.4) 0%,rgba(96,165,250,0) 60%); }
.sec-ppe-s .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(125,211,252,0.35) 0%,rgba(125,211,252,0) 60%); }
.sec-par  .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(56,189,248,0.35) 0%,rgba(56,189,248,0) 60%); }
.sec-aum  .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(14,165,233,0.35) 0%,rgba(14,165,233,0) 60%); }
.sec-hd   .cl-section-header { background:rgba(255,255,255,0.04); background-image:linear-gradient(170deg,rgba(6,182,212,0.35) 0%,rgba(6,182,212,0) 60%); }
.cl-section-header::after { content:’’; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:linear-gradient(135deg,rgba(255,255,255,0.30) 0%,rgba(255,255,255,0.12) 18%,rgba(255,255,255,0) 40%),linear-gradient(270deg,rgba(255,255,255,0.08) 0%,transparent 40%),linear-gradient(0deg,rgba(255,255,255,0.06) 0%,transparent 30%); z-index:0; }
.cl-section-body { background:#222224; border:1px solid rgba(255,255,255,0.12); border-top:none; border-radius:0 0 16px 16px; }
.cl-section.collapsed .cl-section-body { display:none; }
.section-title-wrap { display:flex; align-items:center; gap:9px; position:relative; z-index:1; }
.section-badge { font-family:var(–mono); font-size:12px; font-weight:800; padding:5px 10px; border-radius:8px; letter-spacing:1px; white-space:nowrap; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.32); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),0 2px 6px rgba(0,0,0,0.4); }
.section-title { display:none; }
.section-meta { display:flex; align-items:center; gap:8px; flex-shrink:0; position:relative; z-index:1; }
.section-progress { font-family:var(–mono); font-size:12px; color:rgba(255,255,255,0.75); font-weight:700; }
.cl-chevron { color:rgba(255,255,255,0.7); font-size:10px; transition:transform .2s; }
.cl-section.collapsed .cl-chevron { transform:rotate(-90deg); }
.master-item { display:flex; align-items:flex-start; gap:12px; padding:13px 16px; cursor:pointer; -webkit-tap-highlight-color:transparent; border-bottom:1px solid rgba(255,255,255,0.08); }
.master-item:active { background:rgba(255,255,255,0.05); }
.master-item.checked { opacity:.42; }
.master-item.checked .master-label { text-decoration:line-through; }
.master-item .checkbox { width:26px; height:26px; border-radius:8px; flex-shrink:0; border:1.5px solid rgba(255,200,80,0.7); background:rgba(255,200,80,0.1); display:flex; align-items:center; justify-content:center; transition:all .15s; margin-top:1px; }
.master-item .checkmark,.checkmark { display:none; color:#000; font-size:15px; font-weight:900; }
.master-item.checked .checkmark { display:block; }
.master-label { font-size:15px; font-weight:600; flex:1; line-height:1.3; color:#fff; }
.master-hint { font-size:11px; color:rgba(255,255,255,0.65); margin-top:2px; line-height:1.4; }
.submenu-toggle { padding:8px 16px; display:flex; align-items:center; gap:6px; cursor:pointer; font-family:var(–mono); font-size:10px; color:var(–teal); font-weight:600; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,0.08); -webkit-tap-highlight-color:transparent; }

.submenu-arrow { transition:transform .2s; font-size:9px; }
.submenu-open .submenu-arrow { transform:rotate(90deg); }
.submenu { display:none; background:rgba(0,0,0,0.12); }
.sub-group-label { padding:7px 16px 4px; font-family:var(–mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.07); }
.check-item { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.07); cursor:pointer; -webkit-tap-highlight-color:transparent; }
.check-item:last-child { border-bottom:none; }
.check-item:active { background:rgba(255,255,255,0.04); }
.check-item.checked { opacity:.35; }
.check-item.checked .item-label { text-decoration:line-through; }
.checkbox { width:26px; height:26px; border-radius:8px; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.38); background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; transition:all .15s; margin-top:1px; }
.check-item.checked .checkbox,.master-item.checked .checkbox { background:#2da84f; border-color:#1a7a3c; }
.check-item.checked .checkmark { display:block; }
.item-content { flex:1; }
.item-label { font-size:14px; font-weight:500; line-height:1.3; color:#fff; }
.item-detail { font-size:11px; color:rgba(255,255,255,0.65); margin-top:3px; line-height:1.45; }
.item-tag { display:inline-block; font-family:var(–mono); font-size:8px; letter-spacing:0.5px; padding:2px 7px; border-radius:5px; margin-top:5px; text-transform:uppercase; font-weight:700; }
.tag-oblig { background:rgba(255,69,58,0.18); color:#ffaaaa; border:1px solid rgba(255,69,58,0.4); }
.tag-cond { background:rgba(255,159,10,0.15); color:#ffcc66; border:1px solid rgba(255,159,10,0.4); }
.formula { display:inline-block; font-family:var(–mono); font-size:14px; font-weight:700; background:rgba(26,122,60,0.25); color:#88ffaa; border:1px solid rgba(45,168,79,0.5); padding:3px 12px; border-radius:8px; margin-top:5px; }
.section-note { padding:9px 16px; background:rgba(255,159,10,0.06); border-top:1px solid rgba(255,255,255,0.06); font-size:11px; color:rgba(255,255,255,0.65); line-height:1.5; }
.section-note .warn { color:#ffcc66; font-weight:600; }
.cl-bottom-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(20,20,22,0.88); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.12); padding:10px 16px calc(10px + env(safe-area-inset-bottom)); display:none; gap:10px; z-index:100; }
.btn { flex:1; padding:14px; border-radius:14px; font-family:var(–sans); font-weight:700; font-size:13px; letter-spacing:0.3px; text-transform:uppercase; cursor:pointer; -webkit-tap-highlight-color:transparent; background:rgba(255,255,255,0.08); -webkit-backdrop-filter:blur(24px) saturate(200%); backdrop-filter:blur(24px) saturate(200%); border:1px solid rgba(255,255,255,0.28); box-shadow:inset 0 2px 0 rgba(255,255,255,0.45),inset 0 -1px 0 rgba(0,0,0,0.2),inset 1px 0 0 rgba(255,255,255,0.15),0 6px 20px rgba(0,0,0,0.45); color:#fff; }
.btn-reset { color:rgba(255,255,255,0.8); }
.btn-ok { background:rgba(29,122,60,0.4); color:#88ffaa; border-color:rgba(45,168,79,0.5); flex:2; }
.btn-warn { background:rgba(255,159,10,0.25); color:#ffcc66; border-color:rgba(255,159,10,0.5); flex:2; }
.btn-block { background:rgba(255,69,58,0.25); color:#ffaaaa; border-color:rgba(255,69,58,0.5); flex:2; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:rgba(24,24,26,0.96); -webkit-backdrop-filter:blur(30px); backdrop-filter:blur(30px); border:1px solid rgba(255,255,255,0.18); border-bottom:none; border-radius:22px 22px 0 0; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); width:100%; max-width:520px; max-height:88vh; overflow-y:auto; box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.22),0 -12px 60px rgba(0,0,0,0.6); animation:slideUp .25s ease; }

.blockers { margin-bottom:12px; }

.recap-name { font-size:13px; font-weight:700; flex:1; text-transform:uppercase; letter-spacing:0.5px; color:#fff; }
.recap-score { font-family:var(–mono); font-size:11px; color:rgba(255,255,255,0.5); }
.r-done .recap-score { color:#2da84f; }
.r-block .recap-score { color:#ffaaaa; }
.modal-close { display:block; width:100%; padding:14px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.18); border-radius:14px; font-size:14px; font-weight:600; cursor:pointer; text-align:center; margin-top:8px; box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.2); }
.modal-close.danger { background:rgba(255,69,58,0.15); color:#ffaaaa; border-color:rgba(255,69,58,0.35); }
.cset-modal { background:rgba(24,24,26,0.96); -webkit-backdrop-filter:blur(30px); backdrop-filter:blur(30px); border:1px solid rgba(255,255,255,0.18); border-bottom:none; border-radius:22px 22px 0 0; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); width:100%; max-width:360px; animation:slideUp .25s ease; box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.22); }
.cset-modal h3 { font-size:17px; font-weight:800; color:var(–teal); margin-bottom:20px; text-align:center; }
.dur-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; justify-content:center; }
.dur-lbl { font-family:var(–mono); font-size:12px; color:rgba(255,255,255,0.65); }
.dur-inp { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25); color:#ffcc66; font-family:var(–mono); font-size:28px; padding:10px 14px; border-radius:12px; width:84px; text-align:center; outline:none; }
.dur-inp:focus { border-color:#ffcc66; }
.dur-unit { font-family:var(–mono); font-size:14px; color:rgba(255,255,255,0.6); }
.dur-apply { width:100%; padding:15px; background:rgba(90,200,250,0.22); color:#fff; border:1px solid rgba(90,200,250,0.4); border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.25); }
</style>

</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <button onclick="window.location.href='../index.html'" style="font-family:var(--mono);font-size:14px;font-weight:800;color:#fff;background:none;border:none;padding:6px 0;cursor:pointer;">‹ Accueil</button>
    <div style="width:1px;height:16px;background:rgba(255,255,255,0.15);"></div>
    <div class="logo-badge">FRET</div>
    <h1>Départ Train</h1>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="chrono-bar">
  <span class="chrono-label">⏱ Freins</span>
  <div class="chrono-display idle" id="cDisp">04:00</div>
  <div class="chrono-prog"><div class="chrono-bg"><div class="chrono-fill" id="cFill" style="width:0%"></div></div></div>
  <div class="chrono-btns">
    <button class="cbtn cbtn-start" id="cBtn" onclick="cToggle()">START</button>
    <button class="cbtn cbtn-set" onclick="openSet()">SET</button>
    <button class="cbtn cbtn-rst" onclick="cReset()">RST</button>
  </div>
</div>

<div class="minute-banner">
  <div class="minute-icon">⏱</div>
  <div class="minute-text">
    <strong>Minute d'arrêt — Gestion des conditions de mise en mouvement</strong>
    <span>Analyser · Identifier les menaces · Projet d'actions · Type de marche</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-header">
    <span class="progress-label">Progression</span>
    <span class="progress-count" id="pCount">0 / 0</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="pFill" style="width:0%"></div></div>
</div>

<div id="CL"></div>
<div style="height:4px"></div>

<div class="bottom-bar">
  <button class="btn btn-reset" onclick="resetAll()">↺ Reset</button>
  <button class="btn" id="btnR" onclick="showRecap()">▶ Récap</button>
</div>

<div class="modal-overlay" id="ov" onclick="closeOv(event)">
  <div class="modal" id="mc"><div class="modal-handle"></div></div>
</div>
<div class="modal-overlay" id="cov" onclick="closeCov(event)">
  <div class="cset-modal">
    <h3>⏱ Durée minuteur</h3>
    <div class="dur-row">
      <span class="dur-lbl">Durée :</span>
      <input class="dur-inp" id="dInp" type="number" min="1" max="60" value="4" inputmode="numeric">
      <span class="dur-unit">min</span>
    </div>
    <button class="dur-apply" onclick="applyDur()">Appliquer</button>
  </div>
</div>

<script>
function tick(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();
// NAVIGATION
function goView(name) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  var bb = document.getElementById('cl-bottom-bar');
  if (bb) bb.style.display = (name === 'depart') ? 'flex' : 'none';
  window.scrollTo(0, 0);
}
function bindTap(el, fn) {
  if (!el) return;
  var startY = 0;
  el.addEventListener('touchstart', function(e){ startY = e.touches[0].clientY; }, {passive:true});
  el.addEventListener('touchend', function(e){
    if (Math.abs(e.changedTouches[0].clientY - startY) < 10) { e.preventDefault(); fn(); }
  });
  el.addEventListener('click', fn);
}

// CHRONO
var cT=4*60,cE=0,cR=false,cIv=null;
function cTick(){cE++;drawC();if(cE===cT){try{var ctx=new AudioContext();[880,880,1100].forEach(function(f,i){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;var t=ctx.currentTime+i*.28;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.4,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}var n=0;var b=document.querySelector('.chrono-bar');var iv=setInterval(function(){b.style.background=n%2===0?'rgba(48,209,88,0.2)':'rgba(255,255,255,0.05)';if(++n>5){clearInterval(iv);b.style.background='';}},250);}}
function drawC(){var d=document.getElementById('cDisp'),f=document.getElementById('cFill'),b=document.getElementById('cBtn');if(!cR&&cE===0){d.textContent=(String(Math.floor(cT/60)).padStart(2,'0'))+':'+(String(cT%60).padStart(2,'0'));d.className='chrono-display idle';f.style.width='0%';b.textContent='START';b.className='cbtn cbtn-start';return;}d.textContent=(String(Math.floor(cE/60)).padStart(2,'0'))+':'+(String(cE%60).padStart(2,'0'));f.style.width=Math.min(cE/cT*100,100)+'%';if(cE<cT){d.className='chrono-display run';f.style.background='#ff9f0a';}else{d.className='chrono-display done';f.style.background='#2da84f';}b.textContent=cR?'STOP':'REPRISE';b.className=cR?'cbtn cbtn-start running':'cbtn cbtn-start';}
function cToggle(){if(cR){clearInterval(cIv);cR=false;}else{cR=true;cIv=setInterval(cTick,1000);}drawC();}
function cReset(){clearInterval(cIv);cR=false;cE=0;drawC();}
function openSet(){document.getElementById('dInp').value=Math.round(cT/60);document.getElementById('cov').classList.add('active');}
function applyDur(){cT=Math.max(1,Math.min(60,parseInt(document.getElementById('dInp').value)||4))*60;cReset();document.getElementById('cov').classList.remove('active');}
function closeCov(e){if(!e||e.target===document.getElementById('cov'))document.getElementById('cov').classList.remove('active');}

// CHECKLIST
var DATA=[{"id": "ps", "sc": "sec-ps", "b": "PRISE DE SERVICE", "t": "Prise de service", "mid": "psm", "ml": "Prise de service déjà effectuée", "mh": "Cocher si déjà réalisée, sinon dérouler le détail", "note": "Êtes-vous en accord avec votre PS ?", "groups": [{"label": "Équipement et documents", "items": [{"id": "ps1", "label": "SIRIUS et pochette chargés", "detail": "Mémento, licence et Attestation Complémentaire vérifiés", "tag": "o"}, {"id": "ps2", "label": "Arrivée à l’heure à la PS", "tag": "o"}]}, {"label": "Consultation et préparation", "items": [{"id": "ps3", "label": "Roulement consulté", "tag": "o"}, {"id": "ps4", "label": "Casier personnel consulté", "detail": "Doc ADC, PACIFIC / ES LOCO", "tag": "o"}, {"id": "ps5", "label": "Affichage sécurité consulté", "tag": "o"}, {"id": "ps6", "label": "Avis sécurité (DEFIT) analysés", "tag": "o"}, {"id": "ps7", "label": "Modifications infrastructure repérées", "detail": "LTV et autres modifications prévues mémorisées", "tag": "o"}, {"id": "ps8", "label": "Documents prélevés", "detail": "Formulaires de communication, annexes Sirius", "tag": "o"}, {"id": "ps9", "label": "Rubans de lecture posés, LILI associés à la FT", "tag": "o"}]}]}, {"id": "prep", "sc": "sec-prep", "b": "PRÉP. MISSION", "t": "Préparation de la mission", "mid": "prm", "ml": "Préparation de la mission déjà effectuée", "mh": "Cocher si déjà réalisée, sinon dérouler le détail", "note": "Vérifications sur Sirius Next avant la prise en charge du train.", "groups": [{"label": "Fiche Train", "items": [{"id": "ft1", "label": "Date de la fiche train correcte", "tag": "o"}, {"id": "ft2", "label": "Numéro de train conforme", "tag": "o"}, {"id": "ft3", "label": "Masse tracée supérieure ou égale à la masse réelle du train", "tag": "o"}, {"id": "ft4", "label": "EM tracé = EM en possession", "detail": "Si différent : obtenir autorisation de circulation", "tag": "o"}, {"id": "ft5", "label": "Avis consultés (LTV, modifications définitives)", "tag": "o"}]}]}, {"id": "brief", "sc": "sec-brief", "b": "BRIEF", "t": "Brief", "note": "En fonction du type arrêt et des opérations prévues.", "groups": [{"label": "", "items": [{"id": "br1", "label": "Brief conducteur / agent au sol réalisé", "detail": "N° de voie, conditions PAR et AuM, opérations de sécurité, résultat essai de frein", "tag": "c"}]}]}, {"id": "bf", "sc": "sec-bf", "b": "BF", "t": "Bulletin de Freinage", "note": null, "groups": [{"label": "Identification", "items": [{"id": "bf1", "label": "Date correcte", "tag": "o"}, {"id": "bf2", "label": "Numéro de train conforme", "tag": "o"}, {"id": "bf3", "label": "Destination correcte", "tag": "o"}]}, {"label": "Caractéristiques", "items": [{"id": "bf4", "label": "Tonnage total des véhicules vérifié", "tag": "o"}, {"id": "bf5", "label": "MFR supérieure ou égale à MFN", "detail": "Masse Freinée Réalisée supérieure ou égale à Masse Freinée Nécessaire", "formula": "MFR ≥ MFN", "tag": "o"}, {"id": "bf6", "label": "ATE : présence confirmée (oui / non)", "tag": "o"}, {"id": "bf7", "label": "Restrictions de vitesse signalées", "detail": "Wagons limitants, charges spéciales", "tag": "o"}]}, {"label": "Composition", "items": [{"id": "bf8", "label": "Positionnement du 1er wagon identifié", "detail": "Ordre de liste cohérent avec la composition réelle", "tag": "o"}, {"id": "bf9", "label": "Liste MD présente si applicable", "detail": "Si matières dangereuses : liste MD jointe et vérifiée", "tag": "c"}]}]}, {"id": "ppe_b", "sc": "sec-ppe-b", "b": "PPE BORD", "t": "PPE Bord", "note": null, "groups": [{"label": "Composition", "items": [{"id": "pb1", "label": "N° wagon tête confirmé", "detail": "Cohérent avec BF et liste MD", "tag": "o"}, {"id": "pb2", "label": "Attelage machine / 1er wagon vérifié", "tag": "o"}, {"id": "pb3", "label": "Dispositif vide / chargé vérifié", "tag": "o"}, {"id": "pb4", "label": "Dispositif de freinage : M ou V", "detail": "Régime conforme au type de matériel remorqué", "tag": "o"}]}, {"label": "Systèmes embarqués", "items": [{"id": "pb5", "label": "Signalisation avant mise en service", "tag": "o"}, {"id": "pb6", "label": "Dispositifs de sécurité vérifiés", "detail": "RSO, veille, VACMA selon engin", "tag": "o"}, {"id": "pb7", "label": "Paramétrage bord réalisé (KVB, ETCS)", "detail": "N° train, longueur, masse freinée, catégorie vitesse", "tag": "o"}, {"id": "pb8", "label": "N° de train indexé dans le terminal GSM-R", "tag": "o"}, {"id": "pb9", "label": "Mobile pro GSM-GFU ARES activé si ligne équipée", "tag": "c"}]}]}, {"id": "ppe_s", "sc": "sec-ppe-s", "b": "PPE SOL", "t": "PPE Sol", "note": null, "groups": [{"label": "", "items": [{"id": "pe1", "label": "Résultat essai de frein reçu", "detail": "Conformité transmise par opérateur sol", "tag": "o", "bl": "⛔ Résultat essai de frein non reçu — départ interdit"}, {"id": "pe2", "label": "PPE Sol terminé reçu", "detail": "PPE Sol terminé — verbal ou écrit", "tag": "o", "bl": "⛔ PPE Sol non terminé — départ interdit"}]}]}, {"id": "par", "sc": "sec-par", "b": "PAR", "t": "Déclaration Prêt à Accéder au Réseau", "note": "En fonction du type arrêt.", "groups": [{"label": "", "items": [{"id": "r1", "label": "PAR nécessaire dans cette situation ?", "detail": "1er accès RFN, modif composition, relève", "tag": "c"}, {"id": "r2", "label": "PAR transmis au SGC", "detail": "Train N°..., Voie N°..., Prêt à accéder au réseau", "tag": "o", "bl": "⛔ PAR non transmis au SGC — départ interdit"}, {"id": "r3", "label": "Wagons MD signalés si applicable", "tag": "c"}]}]}, {"id": "aum", "sc": "sec-aum", "b": "AuM", "t": "Autorisation de Mouvement", "note": null, "groups": [{"label": "", "items": [{"id": "a1", "label": "AuM reçue", "detail": "Signalisation, verbal SGC, dépêche, signal à main AuM", "tag": "o", "bl": "⛔ AuM non reçue — départ interdit"}, {"id": "a2", "label": "Type de marche décidé", "detail": "Marche avec restriction ou Marche normale", "tag": "o"}]}]}, {"id": "hd", "sc": "sec-hd", "b": "HD", "t": "Heure de Départ", "note": null, "groups": [{"label": "", "items": [{"id": "h1", "label": "HD contrôlée", "detail": "Ne pas partir avant HD sans ordre explicite", "tag": "o", "bl": "⛔ HD non contrôlée — vérifier heure de départ"}]}]}];

function subs(s){return s.groups.reduce(function(a,g){return a.concat(g.items);},[]);}
function sScore(s){if(s.mid){return{d:(state[s.mid]||subs(s).every(function(i){return state[i.id];}))?1:0,t:1};}var it=subs(s);return{d:it.filter(function(i){return state[i.id];}).length,t:it.length};}
function gScore(){var d=0,t=0;DATA.forEach(function(s){var sc=sScore(s);d+=sc.d;t+=sc.t;});return{d:d,t:t};}
function bls(){return DATA.reduce(function(a,s){return a.concat(subs(s));}, []).filter(function(i){return i.bl&&!state[i.id];});}
var state={};
function load(){try{var s=localStorage.getItem('fret-v11');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('fret-v11',JSON.stringify(state));}catch(e){}}

function render(){
  var c=document.getElementById('CL');c.innerHTML='';
  DATA.forEach(function(sec){
    var sc=sScore(sec),ok=sc.d===sc.t;
    var div=document.createElement('div');
    div.className='cl-section '+sec.sc+(state['_o_'+sec.id]?'':' collapsed');
    div.id='s-'+sec.id;
    var pt=sec.mid?(state[sec.mid]||ok?'✓':subs(sec).filter(function(i){return state[i.id];}).length+'/'+subs(sec).length):sc.d+'/'+sc.t;
    var body='';
    if(sec.mid){
      var mc=state[sec.mid]?'checked':'';
      var so=state['_sb_'+sec.id];
      var smId='sm-'+sec.id;
      var stId='st-'+sec.id;
      body='<div class="master-item '+mc+'" id="mi-'+sec.id+'" onclick="tM(this,\''+sec.id+'\')"><div class="checkbox"><span class="checkmark">✓</span></div><div style="flex:1"><div class="master-label">'+sec.ml+'</div><div class="master-hint">'+sec.mh+'</div></div></div>';
      body+='<div class="submenu-toggle '+(so?'submenu-open':'')+'" id="'+stId+'" onclick="tS(\''+sec.id+'\')"><span class="submenu-arrow">▶</span> Détail des vérifications</div>';
      body+='<div class="submenu" id="'+smId+'" style="'+(so?'':'display:none')+'">'+rG(sec)+'</div>';
    } else {
      body=rG(sec);
    }
    var note=sec.note?'<div class="section-note"><span class="warn">⚠</span> '+sec.note+'</div>':'';
    div.innerHTML='<div class="cl-section-header" onclick="tSec(\''+sec.id+'\')"><div class="section-title-wrap"><span class="section-badge">'+sec.b+'</span></div><div class="section-meta"><span class="section-progress" id="sp-'+sec.id+'">'+pt+'</span><span class="cl-chevron">▼</span></div></div><div class="cl-section-body">'+body+note+'</div>';
    c.appendChild(div);
  });
  upProg();
}

function rG(sec){
  return sec.groups.map(function(g){
    var lbl=g.label?'<div class="sub-group-label">'+g.label+'</div>':'';
    return lbl+g.items.map(function(it){
      var ck=state[it.id]?'checked':'';
      var tag=it.tag?'<span class="item-tag tag-'+(it.tag==='o'?'oblig':'cond')+'">'+(it.tag==='o'?'⚠ Obligatoire':'◈ Conditionnel')+'</span>':'';
      var fml=it.formula?'<div class="formula">'+it.formula+'</div>':'';
      return '<div class="check-item '+ck+'" id="it-'+it.id+'" onclick="tI(\''+it.id+'\')"><div class="checkbox"><span class="checkmark">✓</span></div><div class="item-content"><div class="item-label">'+it.label+'</div>'+(it.detail?'<div class="item-detail">'+it.detail+'</div>':'')+fml+tag+'</div></div>';
    }).join('');
  }).join('');
}

function tI(id){state[id]=!state[id];save();var el=document.getElementById('it-'+id);state[id]?el.classList.add('checked'):el.classList.remove('checked');rC();upProg();}
function tM(el,sid){var sec=DATA.find(function(s){return s.id===sid;});state[sec.mid]=!state[sec.mid];save();var mi=document.getElementById('mi-'+sid);state[sec.mid]?mi.classList.add('checked'):mi.classList.remove('checked');rC();upProg();}
function tS(sid){var k='_sb_'+sid;state[k]=!state[k];save();var m=document.getElementById('sm-'+sid),t=document.getElementById('st-'+sid);if(state[k]){m.style.display='block';t.classList.add('submenu-open');}else{m.style.display='none';t.classList.remove('submenu-open');}}
function tSec(id){var k='_o_'+id;state[k]=!state[k];save();document.getElementById('s-'+id).classList.toggle('collapsed');}
function rC(){DATA.forEach(function(sec){var sc=sScore(sec),ok=sc.d===sc.t;var el=document.getElementById('sp-'+sec.id);if(!el)return;el.textContent=sec.mid?(state[sec.mid]||ok?'✓':subs(sec).filter(function(i){return state[i.id];}).length+'/'+subs(sec).length):sc.d+'/'+sc.t;});}
function upProg(){var gs=gScore(),d=gs.d,t=gs.t;document.getElementById('pCount').textContent=d+' / '+t;document.getElementById('pFill').style.width=((d/t*100).toFixed(1))+'%';var btn=document.getElementById('btnR'),bl=bls();if(bl.length>0){btn.className='btn btn-block';btn.textContent='⛔ Récap ('+bl.length+' bloquant'+(bl.length>1?'s':'')+')';}else if(d===t){btn.className='btn btn-ok';btn.textContent='▶ Récap départ';}else{btn.className='btn btn-warn';btn.textContent='⚠ Récap ('+d+'/'+t+')';}}
function resetAll(){var mc=document.getElementById('mc');mc.className='modal m-warn';mc.innerHTML='<div class="modal-handle"></div><h2 class="warn">↺ Réinitialiser</h2><p style="text-align:center;color:rgba(255,255,255,0.65);font-size:13px;margin-bottom:20px;">Effacer toute la checklist ?</p><button class="modal-close danger" onclick="doReset()">Oui, tout effacer</button><button class="modal-close" style="margin-top:8px;" onclick="closeM()">Annuler</button>';document.getElementById('ov').classList.add('active');}
function doReset(){closeM();state={};save();render();}
function showRecap(){
  var gs=gScore(),d=gs.d,t=gs.t,bl=bls();
  var now=new Date(),h=(String(now.getHours()).padStart(2,'0'))+':'+(String(now.getMinutes()).padStart(2,'0'));
  var blH='';
  if(bl.length>0)blH='<div class="blockers">'+bl.map(function(b){return '<div class="blocker-item"><span class="blocker-icon">⛔</span><span class="blocker-text">'+b.bl+'</span></div>';}).join('')+'</div>';
  var rec='<div class="modal-recap">';
  DATA.forEach(function(sec){var sc=sScore(sec),ok=sc.d===sc.t;var sb=subs(sec).filter(function(i){return i.bl&&!state[i.id];});var rc=sb.length>0?'r-block':ok?'r-done':'r-warn';var sl=sec.mid?(state[sec.mid]?'Validé ✓':ok?'✓ OK':subs(sec).filter(function(i){return state[i.id];}).length+'/'+subs(sec).length):(ok?'✓ OK':sc.d+'/'+sc.t);rec+='<div class="recap-row '+rc+'"><div class="recap-dot"></div><div class="recap-name">'+sec.b+'</div><div class="recap-score">'+sl+(sb.length>0?' ⛔':'')+'</div></div>';});
  rec+='</div><p style="text-align:center;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:12px;">'+h+'</p>';
  var mc=document.getElementById('mc');
  if(bl.length>0){mc.className='modal m-block';mc.innerHTML='<div class="modal-handle"></div><h2 class="block">⛔ Départ bloqué</h2><p class="modal-sub">Conditions non remplies</p>'+blH+rec+'<button class="modal-close" onclick="closeM()">Revenir</button>';}
  else if(d===t){mc.className='modal';mc.innerHTML='<div class="modal-handle"></div><h2 class="ok">✓ Prêt au départ</h2><p class="modal-sub">Toutes les vérifications validées</p>'+rec+'<button class="modal-close" onclick="closeM()">Fermer</button>';}
  else{mc.className='modal m-warn';mc.innerHTML='<div class="modal-handle"></div><h2 class="warn">⚠ Incomplet</h2><p class="modal-sub">'+d+'/'+t+' — aucun bloquant</p>'+rec+'<button class="modal-close" onclick="closeM()">Fermer</button>';}
  document.getElementById('ov').classList.add('active');
}
function closeOv(e){if(e.target===document.getElementById('ov'))closeM();}
function closeM(){document.getElementById('ov').classList.remove('active');}
load();render();
</script>

</body>
</html>
